<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Compass — Startup Edition</title>
<style>
  :root{
    --bg:#0A0D16;
    --surface: rgba(255,255,255,0.05);
    --surface-strong: rgba(255,255,255,0.10);
    --border: rgba(255,255,255,0.10);
    --ink:#EDEFF7;
    --muted:#8891AA;
    --gold:#E8B84B;
    --gold-soft: rgba(232,184,75,0.16);
    --radius: 20px;
    --font-display: Georgia, 'Times New Roman', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box;}
  html{-webkit-tap-highlight-color:transparent;}
  body{
    margin:0; min-height:100vh; color:var(--ink); font-family:var(--font-body);
    background:
      radial-gradient(circle at 15% 15%, #16203D 0%, transparent 45%),
      radial-gradient(circle at 85% 20%, #241634 0%, transparent 45%),
      radial-gradient(circle at 50% 90%, #10233020 0%, transparent 50%),
      var(--bg);
    background-size:180% 180%;
    animation: drift 34s ease-in-out infinite alternate;
    padding: 28px 16px 60px;
  }
  @keyframes drift{0%{background-position:0% 0%}100%{background-position:100% 100%}}
  .wrap{max-width:760px; margin:0 auto;}
  .glass{
    background: var(--surface);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border:1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 24px 60px rgba(0,0,0,0.45);
  }
  header.top{ text-align:center; margin-bottom:22px; }
  .compass-icon{ width:64px; height:64px; margin:0 auto 6px; display:block; }
  .brand-badge{
    display:inline-block; font-family:var(--font-mono); font-size:11px; letter-spacing:2px;
    color:var(--gold); background:var(--gold-soft); border:1px solid rgba(232,184,75,0.35);
    padding:3px 10px; border-radius:999px; margin-bottom:10px;
  }
  h1{ font-family:var(--font-display); font-size:38px; margin:0 0 6px; font-weight:700; letter-spacing:0.5px;}
  .subtitle{ color:var(--muted); font-size:15px; margin:0;}

  .progress-shell{ margin:22px 0 26px; }
  .progress-stages{ display:flex; gap:10px; }
  .stage-block{ flex:1; padding:10px 12px; border-radius:14px; border:1px solid var(--border); background:var(--surface); }
  .stage-block.active{ border-color: rgba(232,184,75,0.5); background: var(--gold-soft); }
  .stage-block .label{ font-family:var(--font-mono); font-size:10px; letter-spacing:1.5px; color:var(--muted); }
  .stage-block.active .label{ color:var(--gold); }
  .stage-block .dots{ display:flex; gap:6px; margin-top:8px; }
  .dot{ width:9px; height:9px; border-radius:50%; background:rgba(255,255,255,0.12); border:1px solid var(--border); transition: all .3s; }
  .dot.done{ background:var(--gold); border-color:var(--gold); }
  .dot.current{ box-shadow:0 0 0 3px rgba(232,184,75,0.25); }

  .task-card{ padding:22px 24px; margin-bottom:18px; }
  .task-label{ font-family:var(--font-mono); font-size:11px; letter-spacing:2px; color:var(--gold); margin-bottom:10px;}
  .task-text{ font-size:19px; line-height:1.5; font-weight:500; }
  .task-hint{ margin-top:10px; font-size:13px; color:var(--muted); }
  .situation{ border-left:3px solid #F87171; }

  .dropzone{ min-height:78px; display:flex; align-items:center; justify-content:center; padding:14px; margin-bottom:18px; border:2px dashed rgba(255,255,255,0.18); transition: all .25s; }
  .dropzone.drag-over{ border-color:var(--gold); background:var(--gold-soft); }
  .dropzone-placeholder{ color:var(--muted); font-size:14px; }

  .role-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:12px; margin-bottom:20px; }
  .role-card{
    --dc:#8891AA;
    position:relative; padding:14px 12px; border-radius:16px; cursor:pointer; user-select:none;
    border:1px solid color-mix(in srgb, var(--dc) 45%, transparent);
    background: linear-gradient(160deg, color-mix(in srgb, var(--dc) 16%, transparent), rgba(255,255,255,0.02));
    display:flex; flex-direction:column; align-items:center; gap:6px; text-align:center;
    transition: transform .18s ease, box-shadow .18s ease, opacity .2s ease;
  }
  .role-card:hover:not(.used):not(.disabled){ transform: translateY(-4px) scale(1.03); box-shadow: 0 10px 24px color-mix(in srgb, var(--dc) 35%, transparent); }
  .role-card:active:not(.used):not(.disabled){ transform: translateY(-1px) scale(0.98); }
  .role-card.used, .role-card.disabled{ opacity:0.28; cursor:not-allowed; filter:grayscale(0.4); }
  .role-card.selected{ border-color: var(--dc); box-shadow:0 0 0 2px color-mix(in srgb, var(--dc) 60%, transparent) inset; background: linear-gradient(160deg, color-mix(in srgb, var(--dc) 30%, transparent), rgba(255,255,255,0.03)); }
  .role-icon{ font-size:24px; }
  .role-name{ font-size:12.5px; font-weight:600; }
  .check{ position:absolute; top:6px; right:8px; color:var(--dc); font-weight:bold; }

  .filled-slot{ display:flex; align-items:center; gap:10px; padding:6px 14px; border-radius:12px; animation: snap .35s ease; }
  @keyframes snap{ 0%{ transform:scale(1.2); opacity:0.3;} 60%{transform:scale(0.97);} 100%{transform:scale(1); opacity:1;} }
  .filled-slot .role-icon{ font-size:22px; }
  .filled-slot .role-name{ font-size:15px; font-weight:600; }

  .order-row{ display:flex; align-items:center; flex-wrap:wrap; gap:6px; margin-bottom:20px; justify-content:center; }
  .order-slot{ min-width:150px; min-height:64px; display:flex; align-items:center; justify-content:center; border:2px dashed rgba(255,255,255,0.18); border-radius:14px; cursor:pointer; padding:6px; transition:border-color .2s; }
  .order-slot.filled{ border-style:solid; border-color:rgba(255,255,255,0.2); }
  .order-slot.correct{ border-color:#4ADE80; background:rgba(74,222,128,0.08); }
  .order-slot.incorrect{ border-color:#F87171; background:rgba(248,113,113,0.08); }
  .slot-num{ font-family:var(--font-mono); color:var(--muted); font-size:13px; }
  .flow-arrow{ color:var(--muted); font-size:18px; padding:0 2px; }

  .action-row{ display:flex; align-items:center; justify-content:flex-end; gap:12px; flex-wrap:wrap; }
  .select-count{ margin-right:auto; font-family:var(--font-mono); font-size:12px; color:var(--muted); }
  button{ font-family:var(--font-body); font-size:14px; font-weight:600; border-radius:12px; padding:12px 22px; cursor:pointer; border:none; transition: all .2s; }
  .btn-primary{ background:var(--gold); color:#1a1305; }
  .btn-primary:hover:not(:disabled){ transform:translateY(-2px); box-shadow:0 8px 20px rgba(232,184,75,0.35); }
  .btn-primary:disabled{ opacity:0.35; cursor:not-allowed; }
  .btn-ghost{ background:transparent; color:var(--muted); border:1px solid var(--border); }
  .btn-ghost:hover{ color:var(--ink); border-color:rgba(255,255,255,0.3); }

  .reveal-box{ padding:22px 24px; margin-bottom:18px; animation: fadeUp .4s ease; }
  @keyframes fadeUp{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  .reveal-line{ display:flex; gap:10px; margin-bottom:14px; align-items:flex-start; }
  .reveal-line .tag{ font-family:var(--font-mono); font-size:11px; letter-spacing:1px; color:var(--gold); white-space:nowrap; padding-top:2px; }
  .reveal-line p{ margin:0; line-height:1.55; font-size:14.5px; color:var(--ink); }
  .chip-row{ display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; }
  .chip{ font-size:12.5px; padding:5px 12px; border-radius:999px; border:1px solid var(--border); background:rgba(255,255,255,0.04); }
  .chip.match{ border-color:#4ADE80; color:#4ADE80; background:rgba(74,222,128,0.08); }
  .chip.missed{ border-color:#F59E0B; color:#F59E0B; background:rgba(245,158,11,0.08); }
  .chip.extra{ border-color:#8891AA; color:var(--muted); }
  .comm-flow{ font-family:var(--font-mono); font-size:12.5px; color:var(--muted); line-height:1.8; }

  .results-card{ padding:28px 26px; text-align:center; margin-bottom:20px; }
  .results-title{ font-family:var(--font-display); font-size:28px; margin:4px 0 4px; }
  .results-sub{ color:var(--muted); font-size:14px; margin-bottom:18px; }
  #radar{ display:block; margin:0 auto; }
  .reflection{ padding:22px 24px; margin-bottom:14px; text-align:left; }
  .reflection h3{ font-family:var(--font-mono); font-size:12px; letter-spacing:1.5px; color:var(--gold); margin:0 0 8px; text-transform:uppercase; }
  .reflection p{ margin:0; line-height:1.6; font-size:14.5px; color:var(--ink); }
  .insight-box{ border-left:3px solid var(--gold); }
  .replay-row{ text-align:center; margin-top:10px; }

  .confetti{ position:fixed; top:-20px; z-index:50; font-size:20px; animation: fall linear forwards; pointer-events:none; }
  @keyframes fall{ to{ transform: translateY(105vh) rotate(360deg); opacity:0.2; } }

  @media (max-width:520px){
    h1{ font-size:30px; }
    .task-text{ font-size:17px; }
    .order-slot{ min-width:120px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <svg class="compass-icon" id="compassIcon" viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="29" fill="none" stroke="#E8B84B" stroke-width="1.5" opacity="0.5"/>
      <circle cx="32" cy="32" r="22" fill="none" stroke="#8891AA" stroke-width="1" opacity="0.35"/>
      <text x="32" y="10" fill="#8891AA" font-size="7" text-anchor="middle" font-family="ui-monospace">N</text>
      <text x="32" y="60" fill="#8891AA" font-size="7" text-anchor="middle" font-family="ui-monospace">S</text>
      <text x="6" y="35" fill="#8891AA" font-size="7" text-anchor="middle" font-family="ui-monospace">W</text>
      <text x="58" y="35" fill="#8891AA" font-size="7" text-anchor="middle" font-family="ui-monospace">E</text>
      <g id="needleGroup" style="transform-origin:32px 32px; transition: transform .6s ease;">
        <line x1="32" y1="32" x2="32" y2="10" stroke="#E8B84B" stroke-width="2.4" stroke-linecap="round"/>
        <line x1="32" y1="32" x2="32" y2="50" stroke="#8891AA" stroke-width="2" stroke-linecap="round"/>
      </g>
      <circle cx="32" cy="32" r="3" fill="#E8B84B"/>
    </svg>
    <span class="brand-badge">STARTUP EDITION</span>
    <h1>Task Compass</h1>
    <p class="subtitle">Learn how work flows through real organizations.</p>
  </header>

  <div id="app"></div>
</div>

<script>
/* ---------------- DATA ---------------- */
const ROLES = {
  founder:{name:"Founder / CEO", icon:"🧭", color:"#E8B84B"},
  pm:{name:"Product Manager", icon:"📋", color:"#6C8EF5"},
  eng:{name:"Engineer", icon:"💻", color:"#4ADE80"},
  design:{name:"Designer", icon:"🎨", color:"#F472B6"},
  growth:{name:"Growth / Marketing", icon:"📈", color:"#FB923C"},
  sales:{name:"Sales", icon:"🤝", color:"#F87171"},
  support:{name:"Customer Support", icon:"🎧", color:"#2DD4BF"},
  ops:{name:"Operations", icon:"⚙️", color:"#A78BFA"}
};
const ROLE_IDS = Object.keys(ROLES);

const STAGE1_POOL = [
  {task:"A customer cancels their subscription, saying the onboarding flow was too confusing.", owner:"design", why:"The Designer owns the end-to-end experience a new user has — a confusing flow is a design problem before it's anything else.", assist:["pm","support"]},
  {task:"The landing page takes over eight seconds to load on mobile devices.", owner:"eng", why:"Page performance comes down to code and infrastructure choices, which live with the Engineer.", assist:["design","ops"]},
  {task:"A user reports they can view a stranger's account by editing the page URL.", owner:"eng", why:"This is a security vulnerability in the codebase — only Engineering can diagnose and patch it safely.", assist:["founder","support"]},
  {task:"Investors ask for updated revenue and burn-rate numbers before the next board meeting.", owner:"founder", why:"Reporting to investors sits with the Founder, since it's tied to fundraising and overall strategy.", assist:["ops","sales"]},
  {task:"A tweet criticizing the product goes mildly viral overnight.", owner:"growth", why:"Public brand perception and how the company responds to it sits with Growth/Marketing.", assist:["founder","support"]},
  {task:"A large potential client asks for a custom pricing plan before they'll sign.", owner:"sales", why:"Negotiating deal terms and pricing with a prospect is core to the Sales role.", assist:["founder","pm"]},
  {task:"Support tickets triple in the days after a new feature launches.", owner:"support", why:"Customer Support owns the direct, day-to-day relationship with users who are running into issues.", assist:["eng","pm"]},
  {task:"The office WiFi keeps dropping and nobody can reach the shared drives.", owner:"ops", why:"Keeping the team's tools and infrastructure running is an Operations responsibility.", assist:["eng"]}
];

const STAGE2_POOL = [
  {task:"A customer reports a bug in checkout during a live marketing campaign.", order:["support","eng","pm"], explanation:"Support is first to hear about it and captures the details, Engineering diagnoses and fixes the bug, and the Product Manager confirms the fix lines up with priorities before it ships."},
  {task:"A customer interview reveals strong demand for a feature that doesn't exist yet.", order:["pm","design","eng"], explanation:"The Product Manager weighs whether it's worth building, Design shapes how it should work and feel, and Engineering builds it."},
  {task:"A large client wants a custom integration before they'll sign a contract.", order:["sales","pm","eng"], explanation:"Sales surfaces the client's requirement, the Product Manager checks it against the roadmap, and Engineering scopes and builds it."},
  {task:"A marketing campaign drives a sudden wave of new signups.", order:["growth","ops","support"], explanation:"Growth drives the traffic, Operations makes sure systems and processes can absorb the load, and Support handles the wave of new-user questions."},
  {task:"An investor asks for updated financial projections ahead of a funding round.", order:["founder","sales","ops"], explanation:"The Founder owns the narrative and the ask, Sales supplies pipeline and revenue data, and Operations supplies the underlying cost and burn numbers."},
  {task:"A social media post about the product spikes traffic overnight.", order:["eng","ops","support"], explanation:"Engineering and Operations first make sure systems hold up under the load, then Support fields the wave of questions from curious new visitors."}
];

const STAGE3_POOL = [
  {task:"Customer satisfaction scores suddenly drop after a product update.", primary:"pm", supporting:["eng","support","design"], reasoning:"The Product Manager coordinates the response since it touches strategy and priorities, Engineering checks for technical regressions, Support surfaces what customers are actually saying, and Design reviews whether the update changed the experience in an unwelcome way.", comm:"Support flags the trend → Product Manager investigates → Engineer checks recent changes → Designer reviews the UX → Product Manager decides next steps."},
  {task:"Sales increase dramatically after a press feature.", primary:"ops", supporting:["eng","support","founder"], reasoning:"Operations leads the scramble to scale systems and processes, Engineering keeps infrastructure stable under the load, Support handles the surge of new-customer questions, and the Founder communicates the moment to the team.", comm:"Founder shares the news → Operations checks capacity → Engineer scales infrastructure → Support prepares for more tickets."},
  {task:"Negative reviews about customer service start appearing online.", primary:"support", supporting:["founder","growth","pm"], reasoning:"Customer Support owns the direct fix to service quality, the Founder may need to respond publicly, Growth/Marketing manages the wider narrative, and the Product Manager looks for a product cause behind the complaints.", comm:"Support reviews the complaints → Product Manager checks for a root cause → Founder considers a public response → Growth manages the narrative."},
  {task:"A major feature is delayed right before a big client demo.", primary:"eng", supporting:["pm","sales","founder"], reasoning:"Engineering is closest to what's actually blocking the work, the Product Manager decides what can be descoped, Sales manages the client relationship, and the Founder may step in for a high-stakes account.", comm:"Engineer flags the delay → Product Manager assesses scope → Sales informs the client → Founder steps in if needed."},
  {task:"A competitor launches a similar product at a much lower price.", primary:"founder", supporting:["sales","growth","pm"], reasoning:"The Founder sets the strategic response, Sales adjusts how deals are pitched and defended, Growth reshapes messaging, and the Product Manager weighs whether the roadmap should shift.", comm:"Founder convenes the team → Sales shares what clients are asking → Growth adjusts messaging → Product Manager weighs roadmap changes."},
  {task:"The servers go down during a major funding announcement.", primary:"eng", supporting:["ops","support","founder"], reasoning:"Engineering fixes the outage directly, Operations coordinates the incident response, Support manages worried customers, and the Founder manages the optics of a very public moment.", comm:"Engineer works the outage → Operations coordinates the response → Support reassures customers → Founder manages public communication."}
];

const INSIGHTS = [
  "Many real workplace problems are solved by teams rather than individuals.",
  "Ownership doesn't mean working alone — it means being accountable for the outcome, even when others do the work.",
  "The best workflows are the ones where handoffs are clear, not the ones with the fewest people involved.",
  "Escalation isn't failure — it's how organizations route problems to the people who can actually solve them.",
  "The same task can look like an engineering problem, a design problem, and a support problem all at once — ownership is about who drives the resolution, not who's affected by it."
];

/* ---------------- STATE ---------------- */
let state;

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function initGame(){
  state = {
    stage:1, qIndex:0, phase:"question", answeredCount:0,
    tasks:{
      1: shuffle(STAGE1_POOL).slice(0,3),
      2: shuffle(STAGE2_POOL).slice(0,3),
      3: shuffle(STAGE3_POOL).slice(0,3)
    },
    selection1: null,
    selection2: [],
    selection3: [],
    scores: { ownership:[], delegation:[], collaboration:[], workflow:[] },
    stage3Detail: []
  };
  render();
}

/* ---------------- AUDIO ---------------- */
function playTone(freq, dur){
  try{
    const ctx = window.__actx || (window.__actx = new (window.AudioContext||window.webkitAudioContext)());
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.frequency.value = freq; o.type = "sine";
    o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0.05, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    o.start(); o.stop(ctx.currentTime + dur);
  }catch(e){ /* audio not available, ignore */ }
}

/* ---------------- RENDER SHELL ---------------- */
function renderProgress(){
  const stages = [
    {n:1, label:"STAGE I · OWNERSHIP"},
    {n:2, label:"STAGE II · ROUTING"},
    {n:3, label:"STAGE III · COLLABORATION"}
  ];
  const blocks = stages.map(s=>{
    const active = state.stage===s.n;
    const dots = [0,1,2].map(i=>{
      let cls="dot";
      const doneCount = state.stage>s.n ? 3 : (state.stage===s.n ? state.qIndex + (state.phase==="reveal"?1:0) : 0);
      if(i < doneCount) cls += " done";
      if(state.stage===s.n && i===state.qIndex && state.phase==="question") cls += " current";
      return '<span class="'+cls+'"></span>';
    }).join("");
    return '<div class="stage-block'+(active?' active':'')+'"><div class="label">'+s.label+'</div><div class="dots">'+dots+'</div></div>';
  }).join("");
  return '<div class="progress-shell"><div class="progress-stages">'+blocks+'</div></div>';
}

function updateCompassNeedle(){
  const total = 9;
  const frac = Math.min(state.answeredCount/total, 1);
  const deg = frac*300 - 0;
  const g = document.getElementById("needleGroup");
  if(g) g.style.transform = "rotate("+deg+"deg)";
}

function render(){
  const app = document.getElementById("app");
  if(state.stage===4){
    app.innerHTML = renderResults();
    drawRadar();
    spawnConfetti();
    updateCompassNeedle();
    return;
  }
  let body = "";
  if(state.stage===1) body = state.phase==="question" ? renderStage1Q() : renderStage1R();
  if(state.stage===2) body = state.phase==="question" ? renderStage2Q() : renderStage2R();
  if(state.stage===3) body = state.phase==="question" ? renderStage3Q() : renderStage3R();
  app.innerHTML = renderProgress() + body;
  updateCompassNeedle();
}

function filledSlotHtml(roleId){
  const r = ROLES[roleId];
  return '<div class="filled-slot" style="--dc:'+r.color+'; border:1px solid '+r.color+'55; background:'+r.color+'1a;">'+
    '<span class="role-icon">'+r.icon+'</span><span class="role-name">'+r.name+'</span></div>';
}

function roleGridHtml(kind){
  return '<div class="role-grid">' + ROLE_IDS.map(id=>{
    const r = ROLES[id];
    let cls = "role-card";
    let attrs = 'data-role="'+id+'" style="--dc:'+r.color+'" draggable="true" ondragstart="dragStart(event,\''+id+'\')"';
    let onclick = "";
    if(kind==="s1"){
      if(state.selection1===id) cls += " selected";
      onclick = ' onclick="selectStage1(\''+id+'\')"';
    } else if(kind==="s2"){
      const used = state.selection2.includes(id);
      if(used) cls += " used";
      onclick = used ? "" : ' onclick="placeStage2(\''+id+'\')"';
    } else if(kind==="s3"){
      const sel = state.selection3.includes(id);
      const disabled = !sel && state.selection3.length>=4;
      if(sel) cls += " selected";
      if(disabled) cls += " disabled";
      onclick = ' onclick="toggleStage3(\''+id+'\')"';
    }
    return '<div class="'+cls+'" '+attrs+onclick+'>'+
      '<span class="role-icon">'+r.icon+'</span><span class="role-name">'+r.name+'</span>'+
      (kind==="s3" && state.selection3.includes(id) ? '<span class="check">✓</span>' : '')+
      '</div>';
  }).join("") + '</div>';
}

function dragStart(ev, id){ ev.dataTransfer.setData("text/plain", id); }

/* ---------------- STAGE 1 ---------------- */
function renderStage1Q(){
  const t = state.tasks[1][state.qIndex];
  return ''+
    '<div class="task-card glass">'+
      '<div class="task-label">TASK '+(state.qIndex+1)+' / 3 · WHO OWNS THIS?</div>'+
      '<div class="task-text">'+t.task+'</div>'+
    '</div>'+
    '<div class="dropzone glass" id="slot1" ondragover="event.preventDefault()" ondrop="dropStage1(event)">'+
      (state.selection1 ? filledSlotHtml(state.selection1) : '<div class="dropzone-placeholder">🎯 Drag or tap the role that owns this</div>')+
    '</div>'+
    roleGridHtml("s1")+
    '<div class="action-row">'+
      '<button class="btn-primary" id="confirmBtn" '+(state.selection1?'':'disabled')+' onclick="confirmStage1()">Confirm Ownership</button>'+
    '</div>';
}

function selectStage1(id){ state.selection1 = id; playTone(500,0.06); render(); }
function dropStage1(ev){ ev.preventDefault(); const id = ev.dataTransfer.getData("text/plain"); if(id){ state.selection1 = id; playTone(500,0.06); render(); } }

function confirmStage1(){
  const t = state.tasks[1][state.qIndex];
  const chosen = state.selection1;
  let score;
  if(chosen===t.owner) score = 100;
  else if(t.assist.includes(chosen)) score = 50;
  else score = 15;
  state.scores.ownership.push(score);
  state.phase = "reveal";
  state.answeredCount++;
  playTone(chosen===t.owner?720:380, 0.12);
  render();
}

function renderStage1R(){
  const t = state.tasks[1][state.qIndex];
  const chosen = state.selection1;
  const isOwner = chosen===t.owner;
  const isAssist = t.assist.includes(chosen);
  const slotClass = isOwner ? "correct" : (isAssist ? "" : "incorrect");
  const verdict = isOwner
    ? "Your pick matches the primary owner."
    : (isAssist ? "Your pick is a common assisting role here — but not the primary owner." : "Your pick isn't typically the primary owner for this one.");
  const assistChips = t.assist.map(id=>'<span class="chip">'+ROLES[id].icon+' '+ROLES[id].name+'</span>').join("");
  return ''+
    '<div class="task-card glass"><div class="task-label">TASK '+(state.qIndex+1)+' / 3 · WHO OWNS THIS?</div><div class="task-text">'+t.task+'</div></div>'+
    '<div class="dropzone glass '+(slotClass?('order-slot '+slotClass).replace('order-slot ',''):'')+'" style="border-style:solid;'+(isOwner?'border-color:#4ADE80;':(isAssist?'':'border-color:#F87171;'))+'">'+filledSlotHtml(chosen)+'</div>'+
    '<div class="reveal-box glass">'+
      '<div class="reveal-line"><span class="tag">VERDICT</span><p>'+verdict+'</p></div>'+
      '<div class="reveal-line"><span class="tag">✓ OWNER</span><p><strong>'+ROLES[t.owner].icon+' '+ROLES[t.owner].name+'</strong> — '+t.why+'</p></div>'+
      '<div class="reveal-line"><span class="tag">MAY ASSIST</span><div class="chip-row">'+assistChips+'</div></div>'+
    '</div>'+
    '<div class="action-row"><button class="btn-primary" onclick="nextStage1()">Next Task →</button></div>';
}

function nextStage1(){
  state.selection1 = null;
  if(state.qIndex<2){ state.qIndex++; state.phase="question"; }
  else { state.stage=2; state.qIndex=0; state.phase="question"; state.selection2=[]; }
  render();
}

/* ---------------- STAGE 2 ---------------- */
function renderStage2Q(){
  const t = state.tasks[2][state.qIndex];
  const n = t.order.length;
  if(state.selection2.length!==n) state.selection2 = new Array(n).fill(null);
  let slotsHtml = "";
  state.selection2.forEach((val, i)=>{
    const numLabel = '<span class="slot-num">'+(i+1)+'</span>';
    slotsHtml += '<div class="order-slot'+(val?' filled':'')+'" data-idx="'+i+'" onclick="clearSlot2('+i+')" ondragover="event.preventDefault()" ondrop="dropStage2(event,'+i+')">'+
      (val ? filledSlotHtml(val) : numLabel) + '</div>';
    if(i<n-1) slotsHtml += '<div class="flow-arrow">→</div>';
  });
  const allFilled = state.selection2.every(v=>v);
  return ''+
    '<div class="task-card glass"><div class="task-label">ROUTE '+(state.qIndex+1)+' / 3 · TASK ROUTING</div><div class="task-text">'+t.task+'</div></div>'+
    '<div class="order-row">'+slotsHtml+'</div>'+
    roleGridHtml("s2")+
    '<div class="action-row">'+
      '<button class="btn-ghost" onclick="resetStage2()">Reset</button>'+
      '<button class="btn-primary" '+(allFilled?'':'disabled')+' onclick="confirmStage2()">Check Route</button>'+
    '</div>';
}

function placeStage2(id){
  const idx = state.selection2.findIndex(v=>v===null);
  if(idx===-1) return;
  state.selection2[idx] = id;
  playTone(500,0.06);
  render();
}
function clearSlot2(i){ if(state.selection2[i]){ state.selection2[i]=null; render(); } }
function dropStage2(ev, i){
  ev.preventDefault();
  const id = ev.dataTransfer.getData("text/plain");
  if(!id || state.selection2.includes(id)) return;
  state.selection2[i] = id;
  playTone(500,0.06);
  render();
}
function resetStage2(){ state.selection2 = state.selection2.map(()=>null); render(); }

function confirmStage2(){
  const t = state.tasks[2][state.qIndex];
  let correct = 0;
  t.order.forEach((id,i)=>{ if(state.selection2[i]===id) correct++; });
  const score = Math.round((correct/t.order.length)*100);
  state.scores.workflow.push(score);
  state.phase = "reveal";
  state.answeredCount++;
  playTone(correct===t.order.length?720:420, 0.12);
  render();
}

function renderStage2R(){
  const t = state.tasks[2][state.qIndex];
  let slotsHtml = "";
  state.selection2.forEach((val,i)=>{
    const ok = val===t.order[i];
    slotsHtml += '<div class="order-slot filled '+(ok?'correct':'incorrect')+'">'+filledSlotHtml(val)+'</div>';
    if(i<state.selection2.length-1) slotsHtml += '<div class="flow-arrow">→</div>';
  });
  const correctChain = t.order.map(id=>ROLES[id].icon+' '+ROLES[id].name).join(" → ");
  return ''+
    '<div class="task-card glass"><div class="task-label">ROUTE '+(state.qIndex+1)+' / 3 · TASK ROUTING</div><div class="task-text">'+t.task+'</div></div>'+
    '<div class="order-row">'+slotsHtml+'</div>'+
    '<div class="reveal-box glass">'+
      '<div class="reveal-line"><span class="tag">TYPICAL ROUTE</span><p class="comm-flow">'+correctChain+'</p></div>'+
      '<div class="reveal-line"><span class="tag">WHY</span><p>'+t.explanation+'</p></div>'+
    '</div>'+
    '<div class="action-row"><button class="btn-primary" onclick="nextStage2()">Next Route →</button></div>';
}

function nextStage2(){
  if(state.qIndex<2){ state.qIndex++; state.phase="question"; state.selection2=[]; }
  else { state.stage=3; state.qIndex=0; state.phase="question"; state.selection3=[]; }
  render();
}

/* ---------------- STAGE 3 ---------------- */
function renderStage3Q(){
  const t = state.tasks[3][state.qIndex];
  return ''+
    '<div class="task-card glass situation"><div class="task-label">SITUATION '+(state.qIndex+1)+' / 3 · COLLABORATION CHALLENGE</div>'+
      '<div class="task-text">🚨 '+t.task+'</div>'+
      '<div class="task-hint">Choose up to 4 roles who should be involved.</div>'+
    '</div>'+
    roleGridHtml("s3")+
    '<div class="action-row">'+
      '<span class="select-count">'+state.selection3.length+' / 4 selected</span>'+
      '<button class="btn-primary" '+(state.selection3.length?'':'disabled')+' onclick="confirmStage3()">Assign Team</button>'+
    '</div>';
}

function toggleStage3(id){
  const idx = state.selection3.indexOf(id);
  if(idx>-1){ state.selection3.splice(idx,1); }
  else if(state.selection3.length<4){ state.selection3.push(id); }
  else { return; }
  playTone(480,0.05);
  render();
}

function confirmStage3(){
  const t = state.tasks[3][state.qIndex];
  const ideal = [t.primary].concat(t.supporting);
  const chosen = state.selection3.slice();
  const matched = chosen.filter(id=>ideal.includes(id));
  const collabScore = Math.round((matched.length/ideal.length)*100);
  const delegScore = Math.max(0, Math.round(100 - (Math.abs(chosen.length-ideal.length)/4)*100));
  state.scores.collaboration.push(collabScore);
  state.scores.delegation.push(delegScore);
  state.stage3Detail.push({task:t.task, chosen:chosen, ideal:ideal, primary:t.primary});
  state.phase = "reveal";
  state.answeredCount++;
  playTone(650,0.14);
  render();
}

function renderStage3R(){
  const t = state.tasks[3][state.qIndex];
  const ideal = [t.primary].concat(t.supporting);
  const chosen = state.selection3;
  const chipsHtml = ROLE_IDS.filter(id=>ideal.includes(id) || chosen.includes(id)).map(id=>{
    const inIdeal = ideal.includes(id);
    const inChosen = chosen.includes(id);
    let cls = "chip";
    let tag = "";
    if(inIdeal && inChosen){ cls += " match"; tag = " (you assigned this)"; }
    else if(inIdeal && !inChosen){ cls += " missed"; tag = " (commonly involved)"; }
    else if(!inIdeal && inChosen){ cls += " extra"; tag = " (not typically needed here)"; }
    return '<span class="'+cls+'">'+ROLES[id].icon+' '+ROLES[id].name+tag+'</span>';
  }).join("");
  return ''+
    '<div class="task-card glass situation"><div class="task-label">SITUATION '+(state.qIndex+1)+' / 3 · COLLABORATION CHALLENGE</div><div class="task-text">🚨 '+t.task+'</div></div>'+
    '<div class="reveal-box glass">'+
      '<div class="reveal-line"><span class="tag">PRIMARY OWNER</span><p><strong>'+ROLES[t.primary].icon+' '+ROLES[t.primary].name+'</strong></p></div>'+
      '<div class="reveal-line"><span class="tag">SUPPORTING</span><div class="chip-row">'+t.supporting.map(id=>'<span class="chip">'+ROLES[id].icon+' '+ROLES[id].name+'</span>').join("")+'</div></div>'+
      '<div class="reveal-line"><span class="tag">REASONING</span><p>'+t.reasoning+'</p></div>'+
      '<div class="reveal-line"><span class="tag">COMMS FLOW</span><p class="comm-flow">'+t.comm+'</p></div>'+
      '<div class="reveal-line"><span class="tag">YOUR TEAM</span><div class="chip-row">'+chipsHtml+'</div></div>'+
    '</div>'+
    '<div class="action-row"><button class="btn-primary" onclick="nextStage3()">Continue →</button></div>';
}

function nextStage3(){
  if(state.qIndex<2){ state.qIndex++; state.phase="question"; state.selection3=[]; }
  else { state.stage=4; render(); }
}

/* ---------------- RESULTS ---------------- */
function avg(arr){ return arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0; }

function buildReflection(scores){
  const cats = {
    "Ownership": scores.ownership,
    "Delegation": scores.delegation,
    "Collaboration": scores.collaboration,
    "Workflow Thinking": scores.workflow
  };
  let best = "Ownership", bestVal = -1;
  Object.keys(cats).forEach(k=>{ if(cats[k]>bestVal){ bestVal=cats[k]; best=k; } });

  const understoodMap = {
    "Ownership": "You were consistently able to identify who a task actually belongs to, even when the task touched more than one function.",
    "Delegation": "You had a good sense of how many people a situation really needed — not too few, not too many.",
    "Collaboration": "You reliably recognized when a problem needed more than one department to solve it.",
    "Workflow Thinking": "You had a strong instinct for the order work should move through an organization."
  };

  const detail = state.stage3Detail;
  const avgChosen = avg(detail.map(d=>d.chosen.length));
  const avgIdeal = avg(detail.map(d=>d.ideal.length));
  const diff = avgChosen - avgIdeal;

  let overAssign;
  if(diff > 0.4){
    const ex = detail.find(d=>d.chosen.length > d.ideal.length) || detail[0];
    overAssign = "In situations like \""+ex.task+"\", you tended to loop in more roles than the scenario strictly called for. That instinct can build alignment, but it's worth periodically asking who really needs to be in the room versus who's just affected by the outcome.";
  } else if(diff < -0.4){
    overAssign = "You didn't really over-assign here — if anything, you kept teams lean and stayed close to a single owner even in situations that had several reasonable contributors. That's efficient, though it can occasionally leave a useful perspective out of the room.";
  } else {
    overAssign = "Your team sizes generally landed close to what these situations called for — not noticeably over- or under-staffed.";
  }

  const collabScore = cats["Collaboration"];
  let underCollab;
  if(collabScore < 65){
    const missedSet = new Set();
    detail.forEach(d=>{ d.ideal.forEach(id=>{ if(!d.chosen.includes(id)) missedSet.add(id); }); });
    const missedNames = Array.from(missedSet).slice(0,3).map(id=>ROLES[id].name);
    underCollab = missedNames.length
      ? "A few roles — like "+missedNames.join(", ")+" — were commonly needed in these scenarios but didn't always make it into your team. Complex, cross-functional problems often pull in more people than they first appear to."
      : "There were moments where a slightly broader team likely would have helped, even though the situation looked like it belonged to one department.";
  } else {
    underCollab = "You consistently identified most of the roles these cross-functional situations called for, even when the connection wasn't obvious at first glance.";
  }

  const insight = INSIGHTS[Math.floor(Math.random()*INSIGHTS.length)];

  return {
    understood: "You showed the strongest instincts around <strong>"+best+"</strong>. "+understoodMap[best],
    overAssign: overAssign,
    underCollab: underCollab,
    insight: insight
  };
}

function renderResults(){
  const ownership = avg(state.scores.ownership);
  const delegation = avg(state.scores.delegation);
  const collaboration = avg(state.scores.collaboration);
  const workflow = avg(state.scores.workflow);
  const r = buildReflection({ownership,delegation,collaboration,workflow});
  return ''+
    '<div class="results-card glass">'+
      '<div class="task-label">DEBRIEF COMPLETE</div>'+
      '<div class="results-title">Your Organizational Compass</div>'+
      '<p class="results-sub">Not a score — a picture of how you think about work moving through a team.</p>'+
      '<canvas id="radar" width="320" height="320"></canvas>'+
    '</div>'+
    '<div class="reflection glass"><h3>What you understood well</h3><p>'+r.understood+'</p></div>'+
    '<div class="reflection glass"><h3>Where you tended to over-assign responsibility</h3><p>'+r.overAssign+'</p></div>'+
    '<div class="reflection glass"><h3>Where you underestimated collaboration</h3><p>'+r.underCollab+'</p></div>'+
    '<div class="reflection glass insight-box"><h3>One insight</h3><p>"'+r.insight+'"</p></div>'+
    '<div class="replay-row"><button class="btn-ghost" onclick="initGame()">↻ Play Again</button></div>';
}

function drawRadar(){
  const canvas = document.getElementById("radar");
  if(!canvas) return;
  const ctx = canvas.getContext("2d");
  const size = 320, cx = size/2, cy = size/2, maxR = 108;
  ctx.clearRect(0,0,size,size);

  const labels = ["Ownership","Delegation","Collaboration","Workflow"];
  const values = [avg(state.scores.ownership), avg(state.scores.delegation), avg(state.scores.collaboration), avg(state.scores.workflow)];
  const angles = labels.map((_,i)=> -Math.PI/2 + i*(Math.PI/2));

  // grid rings
  ctx.strokeStyle = "rgba(255,255,255,0.12)";
  ctx.lineWidth = 1;
  [0.25,0.5,0.75,1].forEach(f=>{
    ctx.beginPath();
    angles.forEach((a,i)=>{
      const x = cx + Math.cos(a)*maxR*f;
      const y = cy + Math.sin(a)*maxR*f;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.closePath();
    ctx.stroke();
  });

  // axis lines + labels
  ctx.fillStyle = "#8891AA";
  ctx.font = "12px ui-monospace, monospace";
  angles.forEach((a,i)=>{
    const x = cx + Math.cos(a)*maxR;
    const y = cy + Math.sin(a)*maxR;
    ctx.strokeStyle = "rgba(255,255,255,0.15)";
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(x,y); ctx.stroke();
    const lx = cx + Math.cos(a)*(maxR+26);
    const ly = cy + Math.sin(a)*(maxR+26);
    ctx.textAlign = "center";
    ctx.fillText(labels[i], lx, ly);
    ctx.fillStyle = "#E8B84B";
    ctx.fillText(values[i]+"%", lx, ly+14);
    ctx.fillStyle = "#8891AA";
  });

  // data polygon (animated grow)
  let t = 0;
  function frame(){
    t += 0.05;
    const f = Math.min(t,1);
    ctx.clearRect(0,0,size,size);
    // redraw grid
    ctx.strokeStyle = "rgba(255,255,255,0.12)";
    [0.25,0.5,0.75,1].forEach(fr=>{
      ctx.beginPath();
      angles.forEach((a,i)=>{
        const x = cx + Math.cos(a)*maxR*fr;
        const y = cy + Math.sin(a)*maxR*fr;
        if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      });
      ctx.closePath(); ctx.stroke();
    });
    angles.forEach((a,i)=>{
      const x = cx + Math.cos(a)*maxR;
      const y = cy + Math.sin(a)*maxR;
      ctx.strokeStyle = "rgba(255,255,255,0.15)";
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(x,y); ctx.stroke();
      const lx = cx + Math.cos(a)*(maxR+26);
      const ly = cy + Math.sin(a)*(maxR+26);
      ctx.fillStyle = "#8891AA"; ctx.textAlign="center";
      ctx.fillText(labels[i], lx, ly);
      ctx.fillStyle = "#E8B84B";
      ctx.fillText(values[i]+"%", lx, ly+14);
    });
    // polygon
    ctx.beginPath();
    angles.forEach((a,i)=>{
      const r = (values[i]/100)*maxR*f;
      const x = cx + Math.cos(a)*r;
      const y = cy + Math.sin(a)*r;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.closePath();
    ctx.fillStyle = "rgba(232,184,75,0.28)";
    ctx.fill();
    ctx.strokeStyle = "#E8B84B";
    ctx.lineWidth = 2;
    ctx.stroke();
    // points
    angles.forEach((a,i)=>{
      const r = (values[i]/100)*maxR*f;
      const x = cx + Math.cos(a)*r;
      const y = cy + Math.sin(a)*r;
      ctx.beginPath(); ctx.arc(x,y,3.5,0,Math.PI*2);
      ctx.fillStyle = "#E8B84B"; ctx.fill();
    });
    if(f<1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function spawnConfetti(){
  const emojis = ["🎉","✨","🧭","⭐"];
  for(let i=0;i<18;i++){
    const el = document.createElement("div");
    el.className = "confetti";
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left = Math.random()*100+"vw";
    el.style.animationDuration = (2.5+Math.random()*2)+"s";
    el.style.animationDelay = (Math.random()*0.6)+"s";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 5000);
  }
}

/* ---------------- INIT ---------------- */
initGame();
</script>
