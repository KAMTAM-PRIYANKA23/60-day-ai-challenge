<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Detective — Case Files</title>
<style>
:root{
  --bg:#070d0a;
  --bg2:#0c1712;
  --panel:#0f1c16;
  --panel2:#132a20;
  --cork:#4a3a28;
  --cork-dark:#3a2e20;
  --cork-line: rgba(0,0,0,.25);
  --paper:#eee6cf;
  --paper2:#f6efdc;
  --ink:#241f16;
  --ink-soft:#4a4436;
  --accent:#22c55e;
  --accent2:#4ade80;
  --accent-dim:#14532d;
  --gold:#d8b34a;
  --red-pin:#b23b32;
  --danger:#e0473f;
  --muted:#8fac9c;
  --shadow: rgba(0,0,0,.65);
  --serif: Georgia, 'Times New Roman', serif;
  --mono: 'Courier New', Courier, monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  min-height:100vh;
  background:
    radial-gradient(ellipse at 20% -10%, rgba(34,197,94,.10), transparent 55%),
    radial-gradient(ellipse at 100% 110%, rgba(34,197,94,.08), transparent 50%),
    var(--bg);
  color:var(--paper);
  font-family: var(--serif);
  overflow-x:hidden;
}
#app{min-height:100vh; position:relative; display:flex; flex-direction:column;}

::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--accent-dim); border-radius:6px;}

/* ---------- Top bar / progress ---------- */
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 26px; background:linear-gradient(180deg, rgba(0,0,0,.35), transparent);
  border-bottom:1px solid rgba(255,255,255,.06);
  position:sticky; top:0; z-index:50; backdrop-filter: blur(6px);
}
.brand{
  display:flex; align-items:center; gap:10px;
  font-family:var(--serif); font-weight:700; letter-spacing:.5px;
  color:var(--accent2); font-size:19px; text-shadow:0 0 14px rgba(74,222,128,.35);
}
.brand .badge-eye{
  width:26px;height:26px;border-radius:50%;
  border:2px solid var(--accent2);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 10px rgba(74,222,128,.5) inset, 0 0 8px rgba(74,222,128,.4);
}
.brand .badge-eye::after{content:'';width:8px;height:8px;border-radius:50%;background:var(--accent2);box-shadow:0 0 6px var(--accent2);}

.progress-track{display:flex; align-items:center; gap:6px;}
.progress-step{
  display:flex; align-items:center; gap:6px; font-family:var(--mono); font-size:11px; color:var(--muted);
  opacity:.55; transition:opacity .35s ease;
}
.progress-step.active{opacity:1; color:var(--accent2);}
.progress-step.done{opacity:.85; color:var(--accent);}
.progress-dot{width:8px;height:8px;border-radius:50%;background:var(--muted); transition:.35s;}
.progress-step.active .progress-dot{background:var(--accent2); box-shadow:0 0 8px var(--accent2);}
.progress-step.done .progress-dot{background:var(--accent);}
.progress-sep{width:18px;height:1px;background:rgba(255,255,255,.15);}
@media (max-width:720px){ .progress-track{display:none;} }

.case-tag{font-family:var(--mono); font-size:11px; color:var(--muted); border:1px solid rgba(255,255,255,.12); padding:4px 8px; border-radius:20px;}

/* ---------- Generic screen wrapper ---------- */
.screen{
  flex:1; width:100%; max-width:1180px; margin:0 auto; padding:28px 20px 60px;
  animation: fadeIn .55s ease;
}
@keyframes fadeIn{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
.screen.leaving{ animation: fadeOut .35s ease forwards; }
@keyframes fadeOut{ to{opacity:0; transform:translateY(-8px);} }

/* ---------- Title screen ---------- */
.title-screen{ display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; min-height:82vh; gap:22px;}
.title-screen .eyeglow{
  width:96px;height:96px;border-radius:50%; border:3px solid var(--accent2);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 30px rgba(74,222,128,.45), inset 0 0 20px rgba(74,222,128,.25);
  animation: pulseGlow 3.2s ease-in-out infinite;
}
.title-screen .eyeglow::after{content:'';width:28px;height:28px;border-radius:50%;background:radial-gradient(circle, var(--accent2), var(--accent-dim)); box-shadow:0 0 18px var(--accent2);}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 30px rgba(74,222,128,.45), inset 0 0 20px rgba(74,222,128,.25);} 50%{box-shadow:0 0 46px rgba(74,222,128,.7), inset 0 0 26px rgba(74,222,128,.4);}}
.title-screen h1{ font-size:44px; margin:0; letter-spacing:1px; color:var(--paper2); text-shadow:0 0 24px rgba(34,197,94,.25);}
.title-screen h1 span{color:var(--accent2);}
.title-screen p.sub{ font-family:var(--mono); color:var(--muted); max-width:520px; line-height:1.7; margin:0;}
.btn{
  font-family:var(--mono); font-size:14px; letter-spacing:.5px; text-transform:uppercase;
  color:var(--bg); background:linear-gradient(180deg, var(--accent2), var(--accent));
  border:none; padding:14px 28px; border-radius:8px; cursor:pointer;
  box-shadow:0 8px 20px rgba(34,197,94,.25), 0 0 0 1px rgba(255,255,255,.08) inset;
  transition: transform .18s ease, box-shadow .18s ease;
}
.btn:hover{ transform:translateY(-2px); box-shadow:0 12px 26px rgba(34,197,94,.4);}
.btn:active{ transform:translateY(0px) scale(.98);}
.btn:disabled{ opacity:.4; cursor:not-allowed; transform:none; box-shadow:none;}
.btn.secondary{ background:transparent; color:var(--accent2); border:1px solid var(--accent-dim); box-shadow:none;}
.btn.secondary:hover{ background:rgba(34,197,94,.08);}
.btn.danger-ghost{ background:transparent; border:1px solid rgba(224,71,63,.5); color:var(--danger); box-shadow:none;}

.file-count{font-family:var(--mono); font-size:12px; color:var(--muted); letter-spacing:1px;}

/* ---------- Manila folder / briefing ---------- */
.folder-wrap{ display:flex; justify-content:center; margin-top:8px; perspective:1400px;}
.folder{
  width:min(640px, 92vw); background:linear-gradient(160deg,#cbb27a,#b89a5f);
  border-radius:6px 6px 10px 10px; position:relative; padding:26px 26px 30px;
  box-shadow:0 24px 50px var(--shadow), 0 0 0 1px rgba(0,0,0,.15);
  transform-origin:top center; animation: folderOpen .7s cubic-bezier(.2,.8,.2,1);
  color:#2a2214;
}
@keyframes folderOpen{ from{ transform:rotateX(-35deg); opacity:0;} to{ transform:rotateX(0deg); opacity:1;} }
.folder::before{
  content:'CASE FILE'; position:absolute; top:-18px; left:26px; background:var(--red-pin);
  color:#fff; font-family:var(--mono); font-size:11px; letter-spacing:2px; padding:5px 12px; border-radius:3px;
  box-shadow:0 4px 10px rgba(0,0,0,.4);
}
.folder .stamp{
  position:absolute; top:14px; right:22px; border:3px solid var(--red-pin); color:var(--red-pin);
  font-family:var(--mono); font-weight:700; font-size:12px; padding:5px 10px; border-radius:4px;
  transform:rotate(-9deg); opacity:.85; letter-spacing:1px;
}
.folder h2{ font-family:var(--serif); font-size:28px; margin:18px 0 4px; color:#211a0f;}
.folder .industry{ font-family:var(--mono); font-size:12px; letter-spacing:1.5px; color:#5c4a26; text-transform:uppercase; margin-bottom:16px;}
.folder .rowline{ display:flex; gap:10px; margin:10px 0; align-items:flex-start; border-top:1px dashed rgba(0,0,0,.2); padding-top:10px;}
.folder .rowline .label{ font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:1px; color:#6b562c; min-width:110px; flex-shrink:0; padding-top:2px;}
.folder .rowline .value{ font-size:15px; line-height:1.5; color:#241d10;}
.briefing-actions{ display:flex; justify-content:center; margin-top:26px;}

/* ---------- Corkboard ---------- */
.corkboard-frame{
  background:linear-gradient(160deg,#5b4326,#3e2f1a);
  border-radius:14px; padding:14px; box-shadow:0 20px 50px var(--shadow);
  border:8px solid #2d2213;
}
.corkboard{
  position:relative; min-height:560px; border-radius:8px; overflow:hidden;
  background-color:var(--cork);
  background-image:
    radial-gradient(circle at 15% 20%, var(--cork-line) 0, transparent 3%),
    radial-gradient(circle at 65% 55%, var(--cork-line) 0, transparent 2%),
    radial-gradient(circle at 40% 80%, var(--cork-line) 0, transparent 2%),
    radial-gradient(circle at 85% 15%, var(--cork-line) 0, transparent 2%),
    radial-gradient(circle at 90% 75%, var(--cork-line) 0, transparent 2%),
    repeating-linear-gradient(45deg, rgba(0,0,0,.03) 0 2px, transparent 2px 6px);
}
.board-header{ display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:14px;}
.board-header h3{ font-family:var(--serif); color:var(--accent2); margin:0; font-size:20px; text-shadow:0 0 12px rgba(74,222,128,.3);}
.board-header p{ font-family:var(--mono); font-size:12px; color:var(--muted); margin:2px 0 0;}
.hint-banner{
  font-family:var(--mono); font-size:12px; color:var(--gold); text-align:center; padding:10px;
  border:1px dashed rgba(216,179,74,.4); border-radius:8px; margin:14px 0; background:rgba(216,179,74,.06);
}

/* evidence cards (draggable on desktop, stacked list on small screens) */
.evidence-card{
  position:absolute; width:230px; background:linear-gradient(180deg, var(--paper2), var(--paper));
  color:var(--ink); border-radius:2px; padding:16px 14px 14px; cursor:grab;
  box-shadow:0 14px 24px rgba(0,0,0,.5), 0 1px 0 rgba(255,255,255,.4) inset;
  transition: box-shadow .2s ease, transform .12s ease;
  font-family:var(--mono); font-size:12.5px; line-height:1.55;
  user-select:none; touch-action:none;
}
.evidence-card:hover{ box-shadow:0 20px 34px rgba(0,0,0,.6), 0 1px 0 rgba(255,255,255,.4) inset; }
.evidence-card.dragging{ cursor:grabbing; z-index:200 !important; transform:scale(1.03) rotate(0deg) !important; box-shadow:0 26px 40px rgba(0,0,0,.7); }
.evidence-card.viewed::after{
  content:'✓ reviewed'; position:absolute; bottom:6px; right:10px; font-size:9px; color:var(--accent-dim); letter-spacing:1px;
}
.evidence-card h4{ margin:0 0 8px; font-family:var(--serif); font-size:15px; color:#22331f; border-bottom:1px solid rgba(0,0,0,.15); padding-bottom:6px;}
.pushpin{
  position:absolute; top:-10px; left:50%; transform:translateX(-50%);
  width:16px;height:16px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #ff8a80, var(--red-pin));
  box-shadow:0 3px 6px rgba(0,0,0,.6), 0 0 6px rgba(224,71,63,.5);
}
.evidence-card.clue .pushpin{ background:radial-gradient(circle at 35% 30%, #ffe08a, var(--gold)); box-shadow:0 3px 6px rgba(0,0,0,.6), 0 0 8px rgba(216,179,74,.6);}
.evidence-card ul{ margin:0; padding-left:16px;}
.evidence-card li{ margin-bottom:4px;}
.tape{
  position:absolute; width:56px; height:18px; background:rgba(255,255,255,.35);
  border:1px solid rgba(255,255,255,.2); top:-8px; right:14px; transform:rotate(4deg);
  box-shadow:0 2px 4px rgba(0,0,0,.2);
}

.metric-bar-row{ display:flex; align-items:center; gap:8px; margin-bottom:7px;}
.metric-bar-row .m-label{ width:70px; flex-shrink:0; font-size:10.5px; color:#4a4436;}
.metric-bar-track{ flex:1; height:8px; background:rgba(0,0,0,.12); border-radius:4px; overflow:hidden;}
.metric-bar-fill{ height:100%; border-radius:4px; background:linear-gradient(90deg, var(--accent-dim), var(--accent)); width:0%; transition:width 1.1s cubic-bezier(.2,.8,.2,1);}
.metric-bar-row .m-val{ width:56px; text-align:right; font-size:10.5px; flex-shrink:0; color:#2a2214;}

.board-footer{ display:flex; justify-content:center; align-items:center; gap:14px; margin-top:18px; flex-wrap:wrap;}
.review-count{font-family:var(--mono); font-size:12px; color:var(--muted);}

/* stacked evidence list for small screens */
.evidence-stack{ display:none; }
@media (max-width:820px){
  .corkboard{ min-height:0; padding:14px;}
  .corkboard .evidence-card{ display:none; }
  .evidence-stack{ display:grid; gap:16px; grid-template-columns:1fr;}
  .evidence-stack .evidence-card{ position:relative; width:100%; top:auto !important; left:auto !important; cursor:default;}
}

/* ---------- Solve screen ---------- */
.solve-wrap{ max-width:760px; margin:0 auto; text-align:center;}
.solve-wrap h2{ font-family:var(--serif); color:var(--paper2); font-size:26px; margin-bottom:6px;}
.solve-wrap p.q{ font-family:var(--mono); color:var(--muted); font-size:13px; margin-bottom:26px;}
.mcq-list{ display:grid; gap:12px; text-align:left;}
.mcq-option{
  background:var(--panel2); border:1px solid rgba(255,255,255,.08); border-radius:10px;
  padding:16px 18px; cursor:pointer; transition:.2s ease; display:flex; gap:12px; align-items:flex-start;
}
.mcq-option:hover{ border-color:var(--accent-dim); background:rgba(34,197,94,.08); transform:translateX(3px);}
.mcq-option.selected{ border-color:var(--accent2); background:rgba(34,197,94,.14); box-shadow:0 0 0 1px var(--accent2) inset;}
.mcq-letter{
  font-family:var(--mono); font-weight:700; color:var(--accent2); border:1px solid var(--accent-dim);
  width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:12px;
}
.mcq-text{ font-size:14.5px; line-height:1.5; color:var(--paper2);}
.solve-actions{ margin-top:26px; display:flex; justify-content:center; gap:12px;}

/* ---------- Case closed screen ---------- */
.closed-wrap{ display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; text-align:center; gap:18px;}
.stamp-anim{
  font-family:var(--serif); font-weight:900; font-size:52px; letter-spacing:4px;
  border:6px solid var(--accent2); color:var(--accent2); padding:14px 30px; border-radius:10px;
  transform:scale(3) rotate(-8deg); opacity:0;
  animation: stampIn .55s .15s cubic-bezier(.3,1.6,.6,1) forwards;
  text-shadow:0 0 20px rgba(74,222,128,.5); box-shadow:0 0 40px rgba(74,222,128,.35);
}
.stamp-anim.wrong{ border-color:var(--danger); color:var(--danger); text-shadow:0 0 20px rgba(224,71,63,.5); box-shadow:0 0 40px rgba(224,71,63,.3);}
@keyframes stampIn{ to{ transform:scale(1) rotate(-8deg); opacity:1;} }
.closed-sub{ font-family:var(--mono); color:var(--muted); font-size:13px; max-width:480px; opacity:0; animation:fadeIn .6s .7s ease forwards;}
.closed-actions{ opacity:0; animation:fadeIn .6s 1.1s ease forwards; display:flex; gap:12px;}

/* ---------- Report screen ---------- */
.report-card{
  background:linear-gradient(180deg, var(--paper2), var(--paper)); color:var(--ink);
  border-radius:8px; padding:30px 32px; box-shadow:0 24px 50px var(--shadow); position:relative;
}
.report-card::before{
  content:'LEARNING REPORT'; position:absolute; top:-14px; left:28px; background:var(--accent-dim); color:#e8ffe f;
  color:#eafff0; font-family:var(--mono); font-size:11px; letter-spacing:2px; padding:5px 14px; border-radius:3px; box-shadow:0 4px 10px rgba(0,0,0,.4);
}
.report-card h2{ font-family:var(--serif); font-size:26px; margin:16px 0 2px; color:#1c2a19;}
.report-card .company-sub{ font-family:var(--mono); font-size:12px; color:#5c5a3b; margin-bottom:18px; text-transform:uppercase; letter-spacing:1px;}
.report-section{ margin-bottom:20px; border-top:1px dashed rgba(0,0,0,.18); padding-top:14px;}
.report-section h5{ margin:0 0 8px; font-family:var(--mono); font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:#3f6b3f;}
.report-section p{ margin:0; line-height:1.65; font-size:14.5px;}
.report-section ul{ margin:6px 0 0; padding-left:20px; line-height:1.7; font-size:14.5px;}
.verdict-pill{ display:inline-block; font-family:var(--mono); font-size:11px; padding:4px 10px; border-radius:20px; margin-bottom:14px;}
.verdict-pill.correct{ background:rgba(34,197,94,.15); color:#1c6b34; border:1px solid rgba(28,107,52,.4);}
.verdict-pill.incorrect{ background:rgba(224,71,63,.12); color:#a12f28; border:1px solid rgba(161,47,40,.4);}
.report-actions{ display:flex; justify-content:center; gap:14px; margin-top:26px; flex-wrap:wrap;}

/* footer credit */
.footer-note{ text-align:center; font-family:var(--mono); font-size:10.5px; color:rgba(143,172,156,.6); padding:20px 0 6px;}
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
"use strict";

/* ============================= CASE DATA ============================= */
const CASES = [
{
  company:"LumeGlow Skincare", industry:"Beauty & Skincare",
  objective:"Launch a new anti-aging serum and drive trial among a young, trend-forward audience.",
  audience:"Gen Z consumers, ages 18–24, active on short-form video platforms.",
  channels:["TikTok influencer seeding","Instagram Reels","Paid social boosting"],
  budget:[{c:"TikTok Influencers",p:70},{c:"Paid Social",p:20},{c:"Email",p:10}],
  metrics:[
    {label:"Reach", value:"4.2M", pct:90},
    {label:"CTR", value:"0.4%", pct:12},
    {label:"Engagement", value:"8.9%", pct:68},
    {label:"Conversions", value:"320", pct:14},
    {label:"Sales", value:"$18,400", pct:16}
  ],
  comments:["\"Love the video but this serum feels made for my mom's age.\"","\"Why market anti-aging to a 20 year old? I don't need this yet.\"","\"Gorgeous content, wrong product for me.\""],
  social:[{platform:"TikTok", stat:"4.1M views across seeded content, comment sentiment split between admiration and confusion"},{platform:"Instagram", stat:"High saves, low link-clicks"}],
  mistakeShort:"Audience–Product Mismatch",
  mistakeFull:"The campaign reached the right platform but partnered with influencers whose actual followers skewed far older than the intended Gen Z buyer, creating a mismatch between the audience reached and the audience needed.",
  clues:[
    "The chosen influencers' audience demographics average age 35–50, not 18–24.",
    "The serum formula is retinol-heavy, designed for mature skin rather than early prevention.",
    "Comment sentiment repeatedly questions why the product is being pitched to a young audience."
  ],
  explanation:"LumeGlow correctly identified TikTok as the right platform, but never verified that its chosen influencers' actual followers matched the intended Gen Z buyer. The influencers were famous, but their communities skewed 15–30 years older — the exact audience the anti-aging serum was formulated for. High reach and engagement masked a fundamental targeting failure that only surfaced once conversions stalled.",
  improvements:["Audit influencer audience demographics before signing any contract.","Reframe messaging around 'prevention' if truly targeting Gen Z, or retarget the campaign to the 35+ audience the product actually suits.","Run a small demographic survey or pilot post before scaling influencer spend.","Track audience-fit as its own KPI, separate from raw reach."]
},
{
  company:"TrailForge Outdoor Gear", industry:"Retail / Outdoor Apparel",
  objective:"Drive online sales of a newly launched hiking boot line.",
  audience:"Outdoor enthusiasts, ages 25–45, frequent hikers and weekend adventurers.",
  channels:["Google Search Ads","YouTube pre-roll","Email newsletter"],
  budget:[{c:"Search Ads",p:60},{c:"YouTube",p:30},{c:"Email",p:10}],
  metrics:[
    {label:"Reach", value:"1.1M", pct:55},
    {label:"CTR", value:"3.8%", pct:88},
    {label:"Engagement", value:"1.2%", pct:20},
    {label:"Conversions", value:"90", pct:10},
    {label:"Sales", value:"$6,200", pct:12}
  ],
  comments:["\"Clicked the ad, but the page took forever to load.\"","\"Tried to check out on my phone, the form kept resetting.\"","\"Gave up buying after the third failed attempt.\""],
  social:[{platform:"Site Analytics", stat:"Mobile bounce rate of 78% on the boot landing page"},{platform:"Support Tickets", stat:"Spike in complaints about checkout errors on mobile"}],
  mistakeShort:"Broken Mobile Checkout Experience",
  mistakeFull:"Ads drove strong click-through rates, but a technical failure in the mobile checkout flow caused most interested buyers to abandon before completing a purchase.",
  clues:[
    "Mobile bounce rate on the landing page reached 78%, far above desktop.",
    "The checkout process worked correctly on desktop with no reported issues.",
    "The site's mobile layout was never responsively tested before launch."
  ],
  explanation:"The targeting and ad creative worked exactly as intended — CTR was excellent. But the campaign fed traffic into a mobile checkout experience that was never properly tested, causing forms to reset and pages to load slowly. This 'leaky funnel' problem meant the vast majority of interested clickers never became buyers, an issue of execution and UX, not targeting or messaging.",
  improvements:["Run full mobile QA testing before any paid traffic campaign goes live.","Simplify the checkout flow to the fewest possible steps.","Add mobile page-speed optimization as a pre-launch checklist item.","Monitor funnel drop-off points in analytics throughout the campaign, not just after it ends."]
},
{
  company:"BrewBound Coffee Co.", industry:"Food & Beverage",
  objective:"Build national awareness for a new cold brew product line.",
  audience:"Coffee drinkers nationwide, ages 20–40, habitual daily consumers.",
  channels:["National TV spots","Billboards","Limited social ads"],
  budget:[{c:"TV",p:55},{c:"Billboards",p:25},{c:"Social",p:20}],
  metrics:[
    {label:"Reach", value:"12M", pct:97},
    {label:"CTR", value:"n/a", pct:8},
    {label:"Engagement", value:"0.6%", pct:14},
    {label:"Conversions", value:"Uneven", pct:22},
    {label:"Sales", value:"Spiky by region", pct:24}
  ],
  comments:["\"Never seen this ad — I don't really watch live TV.\"","\"Saw a billboard, but the nearest store is three hours away.\"","\"Why isn't this campaign on my phone at all?\""],
  social:[{platform:"Internal Research", stat:"68% of the target audience primarily consumes streaming and digital media, not linear TV"},{platform:"Retail Data", stat:"Billboards were placed in regions without any product distribution"}],
  mistakeShort:"Channel Mismatch With Audience Habits",
  mistakeFull:"The campaign invested the majority of its budget in traditional media channels the target audience rarely uses, while under-investing in the digital channels where that audience actually spends its time.",
  clues:[
    "68% of the target demographic primarily consumes streaming/digital content, not linear TV.",
    "Several billboards were placed in cities with no retail distribution of the product.",
    "Digital and social spend was a small fraction of the total budget despite the audience being digital-first."

/* ============================= STATE ============================= */
let state = {
  screen:"title", // title, briefing, board, solve, closed, report
  currentCase:null,
  caseIndex:-1,
  viewed:new Set(),
  mcqOptions:[],
  selectedOption:null,
  wasCorrect:null,
  history:[] // indices already played, to reduce immediate repeats
};

const STEPS = [
  {key:"briefing", label:"Briefing"},
  {key:"board", label:"Investigation"},
  {key:"solve", label:"Accusation"},
  {key:"closed", label:"Verdict"},
  {key:"report", label:"Report"}
];

function pickNewCase(){
  let idx;
  if(CASES.length <= 1){ idx = 0; }
  else{
    do{ idx = Math.floor(Math.random()*CASES.length); }
    while(state.history.length < CASES.length && state.history.includes(idx));
  }
  state.history.push(idx);
  if(state.history.length > CASES.length - 1){ state.history = [idx]; }
  state.caseIndex = idx;
  state.currentCase = CASES[idx];
  state.viewed = new Set();
  state.selectedOption = null;
  state.wasCorrect = null;
}

function buildMcqOptions(caseObj, caseIdx){
  const pool = CASES.map((c,i)=>({i, text:c.mistakeFull})).filter(o=>o.i!==caseIdx);
  // shuffle pool
  for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  const distractors = pool.slice(0,3).map(o=>o.text);
  const options = [caseObj.mistakeFull, ...distractors];
  for(let i=options.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [options[i],options[j]]=[options[j],options[i]]; }
  return options;
}

/* ============================= RENDER HELPERS ============================= */
const app = document.getElementById("app");
const LETTERS = ["A","B","C","D"];

function esc(str){
  const d = document.createElement("div"); d.textContent = str; return d.innerHTML;
}

function topBar(activeKey){
  const stepsHtml = STEPS.map((s,i)=>{
    const activeI = STEPS.findIndex(x=>x.key===activeKey);
    let cls = "progress-step";
    if(i < activeI) cls += " done";
    if(i === activeI) cls += " active";
    return `<div class="${cls}"><span class="progress-dot"></span><span>${s.label}</span></div>` + (i<STEPS.length-1?'<div class="progress-sep"></div>':'');
  }).join("");
  const caseTag = state.currentCase ? `<div class="case-tag">FILE: ${esc(state.currentCase.company)}</div>` : "";
  return `
  <div class="topbar">
    <div class="brand"><span class="badge-eye"></span> MARKETING DETECTIVE</div>
    <div class="progress-track">${stepsHtml}</div>
    ${caseTag}
  </div>`;
}

function render(){
  window.scrollTo({top:0, behavior:"smooth"});
  if(state.screen==="title") return renderTitle();
  if(state.screen==="briefing") return renderBriefing();
  if(state.screen==="board") return renderBoard();
  if(state.screen==="solve") return renderSolve();
  if(state.screen==="closed") return renderClosed();
  if(state.screen==="report") return renderReport();
}

  return [

  ];
}

    </div>`).join("");

  app.innerHTML = `
  ${topBar("board")}
  <div class="screen">
    <div class="board-header">
      <div>
        <h3>Investigation Board</h3>
        <p>Drag each piece of evidence into view. Review it carefully before drawing a conclusion.</p>
      </div>
      <div class="review-count" id="reviewCount">0 / ${cards.length} pieces reviewed</div>
    </div>
    <div class="hint-banner">Tip: click or drag each note to mark it reviewed. Somewhere here is the one mistake that broke this campaign.</div>
    <div class="corkboard-frame">
      <div class="corkboard" id="corkboard">
        ${cardsAbsHtml}
      </div>
    </div>
    <div class="evidence-stack">${cardsStackHtml}</div>
    <div class="board-footer">
      <button class="btn" id="toSolve" disabled>Solve the Case →</button>
    </div>
  </div>
  <div class="footer-note">Step 2–3 of 5 — Review at least 4 pieces of evidence to unlock the accusation stage.</div>
  `;

  // animate metric bars
  requestAnimationFrame(()=>{
    document.querySelectorAll(".metric-bar-fill").forEach(el=>{
      const pct = el.getAttribute("data-pct");
      requestAnimationFrame(()=>{ el.style.width = pct + "%"; });
    });
  });

  const solveBtn = document.getElementById("toSolve");
  const reviewCountEl = document.getElementById("reviewCount");

  function markViewed(id, el){
    if(!state.viewed.has(id)){
      state.viewed.add(id);
      el.classList.add("viewed");
      reviewCountEl.textContent = `${state.viewed.size} / ${cards.length} pieces reviewed`;
      if(state.viewed.size >= Math.min(4, cards.length)){
        solveBtn.disabled = false;
      }
    }
  }

  const allCardEls = document.querySelectorAll(".evidence-card");

  allCardEls.forEach(el=>{
    const id = el.getAttribute("data-id");
    let dragging = false, moved = false, startX=0, startY=0, origLeft=0, origTop=0;

    el.addEventListener("click", ()=>{ if(!moved) markViewed(id, el); });

    if(!isSmall && el.closest("#corkboard")){
      el.addEventListener("pointerdown", (e)=>{
        dragging = true; moved = false;
        el.classList.add("dragging");
        el.setPointerCapture(e.pointerId);
        startX = e.clientX; startY = e.clientY;
        origLeft = parseFloat(el.style.left)||0;
        origTop = parseFloat(el.style.top)||0;
      });
      el.addEventListener("pointermove", (e)=>{
        if(!dragging) return;
        const dx = e.clientX - startX, dy = e.clientY - startY;
        if(Math.abs(dx)>3 || Math.abs(dy)>3) moved = true;
        const board = document.getElementById("corkboard");
        const maxLeft = board.clientWidth - el.offsetWidth;
        const maxTop = board.clientHeight - el.offsetHeight;
        let newLeft = origLeft + dx, newTop = origTop + dy;
        newLeft = Math.max(0, Math.min(maxLeft, newLeft));
        newTop = Math.max(0, Math.min(maxTop, newTop));
        el.style.left = newLeft + "px";
        el.style.top = newTop + "px";
        el.style.transform = "rotate(0deg)";
      });
      const endDrag = (e)=>{
        if(!dragging) return;
        dragging = false;
        el.classList.remove("dragging");
        if(!moved) markViewed(id, el);
      };
      el.addEventListener("pointerup", endDrag);
      el.addEventListener("pointercancel", endDrag);
    }
  });

  solveBtn.addEventListener("click", ()=>{
    if(solveBtn.disabled) return;
    state.mcqOptions = buildMcqOptions(c, state.caseIndex);
    state.screen="solve";
    render();
  });
}

/* ---------- SOLVE ---------- */
function renderSolve(){
  const c = state.currentCase;
  const optsHtml = state.mcqOptions.map((opt, i)=>`
    <div class="mcq-option" data-idx="${i}">
      <div class="mcq-letter">${LETTERS[i]}</div>
      <div class="mcq-text">${esc(opt)}</div>
    </div>`).join("");

  app.innerHTML = `
  ${topBar("solve")}
  <div class="screen">
    <div class="solve-wrap">
      <h2>What was the primary marketing mistake?</h2>
      <p class="q">Case file: ${esc(c.company)} — choose the explanation the evidence supports most strongly.</p>
      <div class="mcq-list">${optsHtml}</div>
      <div class="solve-actions">
        <button class="btn secondary" id="backBoard">← Back to Board</button>
        <button class="btn" id="accuseBtn" disabled>File Accusation</button>
      </div>
    </div>
  </div>
  <div class="footer-note">Step 4 of 5 — Choose carefully. There's only one correct explanation.</div>
  `;

  const options = document.querySelectorAll(".mcq-option");
  const accuseBtn = document.getElementById("accuseBtn");
  options.forEach(opt=>{
    opt.addEventListener("click", ()=>{
      options.forEach(o=>o.classList.remove("selected"));
      opt.classList.add("selected");
      state.selectedOption = state.mcqOptions[parseInt(opt.getAttribute("data-idx"),10)];
      accuseBtn.disabled = false;
    });
  });

  document.getElementById("backBoard").addEventListener("click", ()=>{ state.screen="board"; render(); });
  accuseBtn.addEventListener("click", ()=>{
    state.wasCorrect = state.selectedOption === c.mistakeFull;
    state.screen="closed";
    render();
  });
}

/* ---------- CLOSED ---------- */
function renderClosed(){
  const correct = state.wasCorrect;
  app.innerHTML = `
  ${topBar("closed")}
  <div class="screen">
    <div class="closed-wrap">
      <div class="stamp-anim ${correct?'':'wrong'}">${correct ? 'CASE CLOSED' : 'CASE MISFILED'}</div>
      <div class="closed-sub">${correct
        ? "Your instincts were right. The evidence lines up perfectly with your conclusion. File the full learning report to review what actually happened."
        : "Not quite — the evidence points elsewhere. Every good detective misreads a clue now and then. Open the learning report to see what was really going on."}</div>
      <div class="closed-actions">
        <button class="btn" id="toReport">Open Learning Report →</button>
      </div>
    </div>
  </div>
  <div class="footer-note">Step 5 of 5 — Verdict delivered.</div>
  `;
  document.getElementById("toReport").addEventListener("click", ()=>{ state.screen="report"; render(); });
}

/* ---------- REPORT ---------- */
function renderReport(){
  const c = state.currentCase;
  const correct = state.wasCorrect;
  app.innerHTML = `
  ${topBar("report")}
  <div class="screen">
    <div class="report-card">
      <span class="verdict-pill ${correct?'correct':'incorrect'}">${correct ? "YOUR ACCUSATION: CORRECT" : "YOUR ACCUSATION: INCORRECT"}</span>
      <h2>${esc(c.company)}</h2>
      <div class="company-sub">${esc(c.industry)} — ${esc(c.mistakeShort)}</div>

      <div class="report-section">
        <h5>The Mistake</h5>
        <p>${esc(c.mistakeFull)}</p>
      </div>

      <div class="report-section">
        <h5>Full Explanation</h5>
        <p>${esc(c.explanation)}</p>
      </div>

      <div class="report-section">
        <h5>Supporting Clues</h5>
        <ul>${c.clues.map(cl=>`<li>${esc(cl)}</li>`).join("")}</ul>
      </div>

      <div class="report-section">
        <h5>Suggested Improvements</h5>
        <ul>${c.improvements.map(i=>`<li>${esc(i)}</li>`).join("")}</ul>
      </div>
    </div>
    <div class="report-actions">
      <button class="btn" id="newCase">Start a New Case →</button>
      <button class="btn secondary" id="backTitle">Return to Title</button>
    </div>
  </div>
  <div class="footer-note">Case archived. ${CASES.length} files remain in the cabinet.</div>
  `;
  document.getElementById("newCase").addEventListener("click", ()=>{
    pickNewCase();
    state.screen="briefing";
    render();
  });
  document.getElementById("backTitle").addEventListener("click", ()=>{
    state.screen="title";
    state.currentCase=null;
    render();
  });
}

/* ============================= INIT ============================= */
render();

window.addEventListener("resize", ()=>{
  if(state.screen==="board"){ render(); }
});

})();
</script>
</body>
</html>
