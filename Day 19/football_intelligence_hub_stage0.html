
<style>
  .hub-header { padding: 2rem 0 1.5rem; text-align: center; }
  .hub-badge { display: inline-block; background: var(--color-background-info); color: var(--color-text-info); font-size: 12px; font-weight: 500; padding: 4px 14px; border-radius: 20px; margin-bottom: 1rem; letter-spacing: 0.5px; }
  .hub-title { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 6px; }
  .hub-sub { font-size: 14px; color: var(--color-text-secondary); margin: 0 0 2rem; }
  .stages-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 2rem; flex-wrap: wrap; }
  .stage-pill { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--color-text-secondary); background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: 20px; padding: 5px 12px; }
  .stage-pill i { font-size: 14px; }
  .question-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.5rem; margin: 0 0 1rem; }
  .q-label { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 10px; }
  .q-text { font-size: 16px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 1.25rem; }
  .options-grid { display: flex; flex-direction: column; gap: 8px; }
  .opt-btn { display: flex; align-items: center; gap: 10px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 14px; cursor: pointer; text-align: left; font-size: 14px; color: var(--color-text-primary); transition: border-color 0.15s; }
  .opt-btn:hover { border-color: var(--color-border-info); background: var(--color-background-info); color: var(--color-text-info); }
  .opt-num { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); min-width: 18px; }
</style>

<div class="hub-header">
  <div class="hub-badge"><i class="ti ti-trophy" aria-hidden="true"></i> FIFA World Cup 2026 • Intelligence Hub</div>
  <h2 class="hub-title">Football Intelligence Experience</h2>
  <p class="hub-sub">Three stages: Prediction · IQ Quiz · Personality Match</p>
  <div class="stages-row">
    <div class="stage-pill"><i class="ti ti-chart-line" aria-hidden="true"></i> Stage 1: WC2026 Predictions</div>
    <div class="stage-pill"><i class="ti ti-brain" aria-hidden="true"></i> Stage 2: Football IQ Quiz</div>
    <div class="stage-pill"><i class="ti ti-star" aria-hidden="true"></i> Stage 3: Messi vs Ronaldo</div>
  </div>
</div>

<div class="question-card">
  <p class="q-label">Stage 0 — Knowledge check</p>
  <p class="q-text">How familiar are you with football?</p>
  <div class="options-grid">
    <button class="opt-btn" onclick="sendPrompt('My football knowledge level: I know almost nothing about football — complete beginner.')">
      <span class="opt-num">1</span> I know almost nothing — complete beginner
    </button>
    <button class="opt-btn" onclick="sendPrompt('My football knowledge level: I understand the basics — know it\'s 11 players, goals win games, and I\'ve watched a match or two.')">
      <span class="opt-num">2</span> I understand the basics — watched a few matches
    </button>
    <button class="opt-btn" onclick="sendPrompt('My football knowledge level: I follow it casually — know the big teams, major players, and watch big games like the World Cup.')">
      <span class="opt-num">3</span> I follow it casually — know big teams and watch big games
    </button>
    <button class="opt-btn" onclick="sendPrompt('My football knowledge level: I actively follow football — know leagues, tactics, history, and follow tournaments closely.')">
      <span class="opt-num">4</span> I actively follow football and major tournaments
    </button>
  </div>
</div>
