<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Operation Lifeline: Supply Chain Crisis Lab</title>
<style>
  @font-face { font-family: 'system-mono'; src: local('Menlo'), local('Consolas'); }

  :root{
    --bg-0:#0a0e14;
    --bg-1:#0f1521;
    --bg-2:#141b2a;
    --bg-3:#1b2436;
    --line:#26314a;
    --line-soft:#1c2438;
    --amber:#f5a623;
    --amber-soft:#f5a62333;
    --teal:#2bd9c9;
    --teal-soft:#2bd9c92a;
    --red:#ff5d5d;
    --red-soft:#ff5d5d26;
    --violet:#9b8cff;
    --text-0:#eef2f9;
    --text-1:#aab4c8;
    --text-2:#717f9a;
    --radius:18px;
    --radius-sm:12px;
    --serif: 'Iowan Old Style','Palatino Linotype', Georgia, 'Times New Roman', serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Helvetica, Arial, sans-serif;
    --mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:
      radial-gradient(900px 480px at 85% -10%, #18233a 0%, transparent 60%),
      radial-gradient(700px 420px at -10% 10%, #161f33 0%, transparent 55%),
      var(--bg-0);
    color:var(--text-0);
    font-family:var(--sans);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  #root{ min-height:100vh; }

  ::selection{ background:var(--amber-soft); color:var(--text-0); }

  .scaffold{
    max-width:1180px;
    margin:0 auto;
    padding:28px 24px 90px;
  }

  /* ---------- Top bar / telemetry signature ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 22px;
    border:1px solid var(--line);
    border-radius:14px;
    background:linear-gradient(180deg, var(--bg-2), var(--bg-1));
    margin-bottom:26px;
    gap:16px;
    flex-wrap:wrap;
  }
  .brand{
    display:flex; align-items:center; gap:12px;
  }
  .brand-mark{
    width:34px; height:34px; border-radius:9px;
    background:conic-gradient(from 220deg, var(--amber), var(--violet), var(--teal), var(--amber));
    display:flex; align-items:center; justify-content:center;
    font-family:var(--mono); font-weight:700; font-size:13px; color:#0a0e14;
    box-shadow:0 0 0 1px var(--line), 0 6px 18px -6px #f5a62355;
  }
  .brand-text .eyebrow{
    font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--text-2);
  }
  .brand-text .title{
    font-size:15px; font-weight:700; letter-spacing:.01em;
  }
  .telemetry{
    display:flex; gap:18px; flex-wrap:wrap;
  }
  .telemetry-item{
    font-family:var(--mono); font-size:11.5px; color:var(--text-2);
    display:flex; align-items:center; gap:7px;
  }
  .telemetry-item .dot{
    width:7px; height:7px; border-radius:50%;
    background:var(--teal);
    box-shadow:0 0 0 3px var(--teal-soft);
  }
  .telemetry-item.live .dot{
    background:var(--amber);
    box-shadow:0 0 0 3px var(--amber-soft);
    animation:pulse-dot 1.6s infinite;
  }
  @keyframes pulse-dot{
    0%,100%{ transform:scale(1); opacity:1; }
    50%{ transform:scale(1.5); opacity:.55; }
  }
  .telemetry-item strong{ color:var(--text-1); font-weight:600; }

  /* ---------- Generic layout helpers ---------- */
  .stage{
    animation:stage-in .5s cubic-bezier(.16,.9,.3,1);
  }
  @keyframes stage-in{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .eyebrow-label{
    font-family:var(--mono); font-size:11.5px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--amber); margin-bottom:10px; display:flex; align-items:center; gap:10px;
  }
  .eyebrow-label::before{
    content:''; width:18px; height:1px; background:var(--amber); opacity:.6;
  }

  h1.stage-title{
    font-family:var(--serif);
    font-size:clamp(28px,4.2vw,42px);
    font-weight:600;
    line-height:1.1;
    margin:0 0 12px;
    letter-spacing:-.01em;
  }
  p.stage-sub{
    color:var(--text-1);
    font-size:15.5px;
    line-height:1.65;
    max-width:680px;
    margin:0 0 28px;
  }

  .why-box{
    border:1px dashed var(--line);
    border-left:3px solid var(--violet);
    background:var(--bg-2);
    border-radius:10px;
    padding:14px 16px;
    font-size:13.5px;
    line-height:1.6;
    color:var(--text-1);
    margin:18px 0 28px;
  }
  .why-box b{ color:var(--violet); font-weight:700; }

  /* ---------- Welcome ---------- */
  .welcome-wrap{
    min-height:78vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    padding:40px 20px;
  }
  .welcome-glyph{
    width:84px; height:84px; border-radius:22px;
    background:linear-gradient(155deg, var(--bg-3), var(--bg-1));
    border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    margin-bottom:30px;
    position:relative;
    box-shadow:0 20px 60px -25px #000;
  }
  .welcome-glyph svg{ width:40px; height:40px; }
  .welcome-glyph::after{
    content:'';
    position:absolute; inset:-1px;
    border-radius:22px;
    border:1px solid var(--amber-soft);
    animation:ring-pulse 2.4s infinite;
  }
  @keyframes ring-pulse{
    0%{ transform:scale(1); opacity:.9; }
    100%{ transform:scale(1.35); opacity:0; }
  }
  .welcome-eyebrow{
    font-family:var(--mono); letter-spacing:.2em; text-transform:uppercase;
    font-size:12px; color:var(--text-2); margin-bottom:18px;
  }
  h1.welcome-title{
    font-family:var(--serif);
    font-size:clamp(36px,6vw,64px);
    line-height:1.05;
    margin:0 0 18px;
    background:linear-gradient(135deg, #fff 10%, #c9d4e8 55%, #8b97b3 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    letter-spacing:-.02em;
  }
  p.welcome-sub{
    max-width:560px; color:var(--text-1); font-size:16.5px; line-height:1.7; margin:0 0 36px;
  }
  .welcome-facts{
    display:flex; gap:14px; flex-wrap:wrap; justify-content:center; margin-bottom:42px;
  }
  .welcome-fact{
    font-family:var(--mono); font-size:12px; color:var(--text-2);
    border:1px solid var(--line); border-radius:30px; padding:8px 16px;
    background:var(--bg-2);
  }

  /* ---------- Buttons ---------- */
  .btn{
    font-family:var(--sans);
    font-size:14.5px;
    font-weight:600;
    padding:13px 26px;
    border-radius:11px;
    border:1px solid transparent;
    cursor:pointer;
    transition:transform .18s ease, box-shadow .18s ease, background .18s ease, border-color .18s ease;
    display:inline-flex; align-items:center; gap:9px;
  }
  .btn:active{ transform:translateY(1px) scale(.99); }
  .btn-primary{
    background:linear-gradient(135deg, var(--amber), #e08c00);
    color:#1a1206;
    box-shadow:0 10px 30px -10px #f5a62366;
  }
  .btn-primary:hover{ box-shadow:0 14px 34px -8px #f5a62399; transform:translateY(-1px); }
  .btn-primary:disabled{
    opacity:.4; cursor:not-allowed; box-shadow:none; transform:none;
  }
  .btn-ghost{
    background:transparent; color:var(--text-1); border-color:var(--line);
  }
  .btn-ghost:hover{ border-color:var(--text-2); color:var(--text-0); background:var(--bg-2); }
  .btn-sm{ padding:9px 16px; font-size:13px; border-radius:9px; }

  .stage-footer{
    display:flex; justify-content:space-between; align-items:center;
    margin-top:34px; gap:14px; flex-wrap:wrap;
  }

  /* ---------- Card grid ---------- */
  .grid{
    display:grid;
    gap:16px;
    grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
  }
  .card{
    background:linear-gradient(165deg, var(--bg-2), var(--bg-1));
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px;
    transition:transform .22s ease, border-color .22s ease, box-shadow .22s ease;
    position:relative;
    overflow:hidden;
  }
  .card:hover{
    transform:translateY(-3px);
    border-color:#384866;
    box-shadow:0 18px 40px -22px #000;
  }
  .card .card-label{
    font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--text-2); margin-bottom:8px;
  }
  .card .card-value{
    font-size:21px; font-weight:700; letter-spacing:-.01em; margin-bottom:4px;
  }
  .card .card-hint{ font-size:12.5px; color:var(--text-1); line-height:1.5; }
  .card .card-icon{
    position:absolute; top:16px; right:16px; opacity:.5;
  }

  /* ---------- Company profile ---------- */
  .company-header{
    display:flex; align-items:center; gap:16px; margin-bottom:24px; flex-wrap:wrap;
  }
  .company-logo{
    width:54px; height:54px; border-radius:14px;
    background:var(--bg-3); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--serif); font-size:22px; font-weight:700; color:var(--amber);
  }
  .company-name{ font-family:var(--serif); font-size:24px; font-weight:600; margin:0; }
  .company-tag{ color:var(--text-2); font-size:13px; font-family:var(--mono); }

  /* ---------- Crisis card ---------- */
  .crisis-banner{
    border-radius:var(--radius);
    border:1px solid #5a2c2c;
    background:linear-gradient(135deg, #2a1414, #1c1116 60%);
    padding:26px 26px;
    margin:26px 0 30px;
    position:relative;
    overflow:hidden;
  }
  .crisis-banner::before{
    content:''; position:absolute; inset:0;
    background:repeating-linear-gradient(135deg, #ff5d5d08 0 2px, transparent 2px 14px);
    pointer-events:none;
  }
  .crisis-tag{
    display:inline-flex; align-items:center; gap:8px;
    font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--red); background:var(--red-soft); padding:6px 12px; border-radius:30px;
    margin-bottom:14px;
    border:1px solid #ff5d5d44;
  }
  .crisis-tag .dot{ width:7px; height:7px; border-radius:50%; background:var(--red); animation:pulse-dot 1.4s infinite; }
  .crisis-title{ font-family:var(--serif); font-size:26px; margin:0 0 10px; font-weight:600; }
  .crisis-desc{ color:var(--text-1); font-size:14.5px; line-height:1.7; max-width:760px; }
  .crisis-meta{ display:flex; gap:24px; margin-top:18px; flex-wrap:wrap; }
  .crisis-meta-item{ font-family:var(--mono); font-size:12px; color:var(--text-2); }
  .crisis-meta-item b{ color:var(--text-0); display:block; font-size:14px; font-family:var(--sans); margin-top:2px; }

  /* ---------- Metrics bars ---------- */
  .metrics-panel{
    background:var(--bg-2); border:1px solid var(--line); border-radius:var(--radius);
    padding:22px 22px 14px; margin:24px 0;
  }
  .metrics-panel-title{
    font-family:var(--mono); font-size:11.5px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--text-2); margin-bottom:18px;
  }
  .metric-row{ margin-bottom:16px; }
  .metric-row-top{
    display:flex; justify-content:space-between; align-items:baseline; margin-bottom:7px;
  }
  .metric-name{ font-size:13.5px; font-weight:600; color:var(--text-0); }
  .metric-value{ font-family:var(--mono); font-size:13px; color:var(--text-1); }
  .metric-value.delta-up{ color:var(--teal); }
  .metric-value.delta-down{ color:var(--red); }
  .bar-track{
    height:9px; border-radius:6px; background:var(--bg-3);
    overflow:hidden; position:relative; border:1px solid var(--line-soft);
  }
  .bar-fill{
    height:100%; border-radius:6px;
    transition:width 1s cubic-bezier(.16,.9,.3,1);
    background:linear-gradient(90deg, var(--teal), #1fb7a9);
  }
  .bar-fill.warn{ background:linear-gradient(90deg, var(--amber), #d98a00); }
  .bar-fill.danger{ background:linear-gradient(90deg, var(--red), #c43a3a); }

  /* ---------- Action choice cards (war room / AI) ---------- */
  .choice-grid{
    display:grid; gap:14px;
    grid-template-columns:repeat(auto-fit, minmax(260px,1fr));
    margin-bottom:8px;
  }
  .choice-card{
    text-align:left;
    background:var(--bg-2);
    border:1px solid var(--line);
    border-radius:var(--radius-sm);
    padding:18px;
    cursor:pointer;
    transition:all .2s ease;
    color:var(--text-0);
    font-family:inherit;
    position:relative;
  }
  .choice-card:hover{ border-color:#3c4d70; background:var(--bg-3); transform:translateY(-2px); }
  .choice-card.selected{
    border-color:var(--amber);
    background:linear-gradient(165deg, #2a2010, #1c1810);
    box-shadow:0 0 0 1px var(--amber-soft);
  }
  .choice-card.disabled{ opacity:.35; cursor:not-allowed; }
  .choice-card.disabled:hover{ transform:none; border-color:var(--line); background:var(--bg-2); }
  .choice-check{
    position:absolute; top:14px; right:14px;
    width:22px; height:22px; border-radius:50%;
    border:1.5px solid var(--line); display:flex; align-items:center; justify-content:center;
    font-size:12px; color:transparent; transition:all .2s ease;
  }
  .choice-card.selected .choice-check{
    background:var(--amber); border-color:var(--amber); color:#1a1206;
  }
  .choice-title{ font-weight:700; font-size:14.5px; margin:0 0 6px; padding-right:28px; }
  .choice-desc{ font-size:12.8px; color:var(--text-1); line-height:1.55; margin:0 0 12px; }
  .choice-tags{ display:flex; gap:6px; flex-wrap:wrap; }
  .choice-pill{
    font-family:var(--mono); font-size:10.5px; padding:3px 9px; border-radius:20px;
    background:var(--bg-3); color:var(--text-2); border:1px solid var(--line);
  }

  /* ---------- Negotiation ---------- */
  .negotiation-stage{
    background:var(--bg-2); border:1px solid var(--line); border-radius:var(--radius);
    padding:24px; margin-bottom:22px;
  }
  .neg-round-label{
    font-family:var(--mono); font-size:11px; color:var(--amber); letter-spacing:.1em; text-transform:uppercase; margin-bottom:10px;
  }
  .neg-prompt{ font-size:15.5px; line-height:1.7; color:var(--text-0); margin-bottom:20px; }
  .neg-stats{
    display:flex; gap:22px; margin-bottom:22px; flex-wrap:wrap;
  }
  .neg-stat{ font-family:var(--mono); font-size:12px; color:var(--text-2); }
  .neg-stat b{ display:block; font-size:17px; color:var(--text-0); font-family:var(--sans); margin-top:2px; }

  /* ---------- Boardroom ---------- */
  .question-counter{
    font-family:var(--mono); font-size:11.5px; color:var(--text-2); letter-spacing:.1em; text-transform:uppercase; margin-bottom:8px;
  }

  /* ---------- Progress stepper ---------- */
  .stepper{
    display:flex; gap:8px; margin-bottom:30px; flex-wrap:wrap;
  }
  .step-pip{
    flex:1; min-width:60px; height:5px; border-radius:4px; background:var(--bg-3);
    position:relative; overflow:hidden;
  }
  .step-pip.done{ background:var(--teal); }
  .step-pip.active{ background:var(--line); }
  .step-pip.active::after{
    content:''; position:absolute; inset:0; width:50%;
    background:var(--amber); animation:step-shimmer 1.4s infinite;
  }
  @keyframes step-shimmer{
    0%{ transform:translateX(-100%); } 100%{ transform:translateX(300%); }
  }
  .step-labels{
    display:flex; justify-content:space-between; font-family:var(--mono); font-size:10px;
    color:var(--text-2); margin-top:-22px; margin-bottom:30px; flex-wrap:wrap; gap:4px;
  }

  /* ---------- Final dashboard ---------- */
  .score-hero{
    display:flex; align-items:center; gap:32px; flex-wrap:wrap;
    background:linear-gradient(135deg, var(--bg-2), var(--bg-1));
    border:1px solid var(--line); border-radius:var(--radius);
    padding:32px; margin-bottom:28px;
  }
  .score-ring-wrap{ position:relative; width:160px; height:160px; flex-shrink:0; }
  .score-ring-wrap svg{ transform:rotate(-90deg); }
  .score-ring-bg{ fill:none; stroke:var(--bg-3); stroke-width:12; }
  .score-ring-fg{ fill:none; stroke-width:12; stroke-linecap:round; transition:stroke-dashoffset 1.4s cubic-bezier(.16,.9,.3,1); }
  .score-ring-text{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .score-ring-text .num{ font-family:var(--serif); font-size:40px; font-weight:700; }
  .score-ring-text .lbl{ font-family:var(--mono); font-size:10px; color:var(--text-2); text-transform:uppercase; letter-spacing:.1em; }
  .score-hero-text{ flex:1; min-width:240px; }
  .score-grade{ font-family:var(--serif); font-size:26px; margin:0 0 8px; }
  .score-blurb{ color:var(--text-1); font-size:14.5px; line-height:1.65; max-width:560px; }

  .feedback-grid{
    display:grid; gap:16px; grid-template-columns:repeat(auto-fit, minmax(260px,1fr));
    margin-bottom:24px;
  }
  .feedback-card{
    background:var(--bg-2); border:1px solid var(--line); border-radius:var(--radius-sm);
    padding:18px;
    border-left:3px solid var(--line);
  }
  .feedback-card.mistake{ border-left-color:var(--red); }
  .feedback-card.best{ border-left-color:var(--teal); }
  .feedback-card.expert{ border-left-color:var(--violet); }
  .feedback-card .fc-label{
    font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--text-2); margin-bottom:8px;
  }
  .feedback-card .fc-body{ font-size:13.5px; line-height:1.6; color:var(--text-0); }

  .lessons-panel{
    background:var(--bg-2); border:1px solid var(--line); border-radius:var(--radius);
    padding:22px; margin-bottom:28px;
  }
  .lessons-panel ul{ margin:0; padding-left:20px; }
  .lessons-panel li{ font-size:13.8px; line-height:1.8; color:var(--text-1); }
  .lessons-panel li::marker{ color:var(--amber); }

  /* ---------- misc ---------- */
  .pill-row{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
  .pill{
    font-family:var(--mono); font-size:11.5px; padding:6px 13px; border-radius:30px;
    background:var(--bg-2); border:1px solid var(--line); color:var(--text-1);
  }

  @media (max-width:640px){
    .scaffold{ padding:18px 14px 70px; }
    .topbar{ padding:12px 14px; }
    .telemetry{ display:none; }
    .score-hero{ padding:22px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

/* =========================================================================
   ICONS (tiny inline SVGs, no external assets)
========================================================================= */
const Icon = ({ name, size=18, color="currentColor" }) => {
  const common = { width:size, height:size, viewBox:"0 0 24 24", fill:"none", stroke:color, strokeWidth:1.7, strokeLinecap:"round", strokeLinejoin:"round" };
  switch(name){
    case "ship": return <svg {...common}><path d="M2 20l1.5-4h17L22 20"/><path d="M4 16V8l8-3 8 3v8"/><path d="M12 5v11"/></svg>;
    case "factory": return <svg {...common}><path d="M3 21V9l5 3V9l5 3V9l5 3v9z"/><path d="M3 21h18"/></svg>;
    case "warehouse": return <svg {...common}><path d="M3 9l9-5 9 5v11H3z"/><path d="M9 20v-7h6v7"/></svg>;
    case "globe": return <svg {...common}><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 010 18 14 14 0 010-18z"/></svg>;
    case "fire": return <svg {...common}><path d="M12 22c4 0 6.5-2.7 6.5-6.2 0-2.6-1.5-4-2.6-5.7-.7 1.4-1.6 2-2.2 1.3.6-2.6-.6-5-2.7-6.4-.4 2-1.5 3.2-3 4.6C6.1 11.2 5.5 13 5.5 15.2 5.5 19 8 22 12 22z"/></svg>;
    case "bank": return <svg {...common}><path d="M3 21h18"/><path d="M4 21V10l8-6 8 6v11"/><path d="M9 21v-7h6v7"/></svg>;
    case "anchor": return <svg {...common}><circle cx="12" cy="5" r="2"/><path d="M12 7v14"/><path d="M5 12H2a10 10 0 0010 10 10 10 0 0010-10h-3"/><path d="M5 12a7 7 0 007 7"/></svg>;
    case "shield": return <svg {...common}><path d="M12 2l8 4v6c0 5-3.4 8.5-8 10-4.6-1.5-8-5-8-10V6z"/><path d="M9.5 12l2 2 4-4"/></svg>;

    name, industry, revenue, factories, warehouses, suppliers,
    inventoryDays, leadTime, countries,
    initials: name.split(" ").map(w=>w[0]).slice(0,2).join("")

}

  return (
    <div>
      <div className="stepper">

function MetricBar({ name, value, suffix="", barClass="" }){
  const cls = barClass || (value < 35 ? "danger" : value < 60 ? "warn" : "");
  return (
    <div className="metric-row">
      <div className="metric-row-top">
        <span className="metric-name">{name}</span>
        <span className="metric-value">{Math.round(value)}{suffix}</span>
      </div>
      <div className="bar-track">
        <div className={"bar-fill " + cls} style={{ width: clamp(value) + "%" }}></div>
      </div>
    </div>
  );
}

          <div className="crisis-meta-item">Revenue at risk<b style={{color:"var(--red)"}}>{crisis.financialImpact}%</b></div>

/* =========================================================================
   STAGE 3: WAR ROOM
========================================================================= */
function WarRoom({ onComplete }){
  const [selected, setSelected] = useState([]);
  const [locked, setLocked] = useState(false);
  const [metrics, setMetrics] = useState({ cost:50, inventory:50, profit:50, delivery:50, satisfaction:50 });
  const [showResults, setShowResults] = useState(false);

  const toggle = (id) => {
    if (locked) return;
    setSelected(prev => {
      if (prev.includes(id)) return prev.filter(x => x !== id);
      if (prev.length >= 3) return prev;
      return [...prev, id];
    });
  };

  const simulate = () => {
    setLocked(true);
    const chosen = WAR_ROOM_ACTIONS.filter(a => selected.includes(a.id));
    const next = { cost:50, inventory:50, profit:50, delivery:50, satisfaction:50 };
    chosen.forEach(a => {
      next.cost = clamp(next.cost + a.effects.cost);
      next.inventory = clamp(next.inventory + a.effects.inventory);
      next.profit = clamp(next.profit + a.effects.profit);
      next.delivery = clamp(next.delivery + a.effects.delivery);
      next.satisfaction = clamp(next.satisfaction + a.effects.satisfaction);
    });
    setShowResults(true);
    // animate after a tick so CSS transition triggers
    setTimeout(() => setMetrics(next), 80);
  };

  const avgScore = Math.round((metrics.cost + metrics.inventory + metrics.profit + metrics.delivery + metrics.satisfaction) / 5);

  return (
    <div className="stage">
      <div className="eyebrow-label">Step 3 of 6 · War Room</div>
      <h1 className="stage-title">Choose your response</h1>
      <p className="stage-sub">
        Pick exactly <b style={{color:"var(--text-0)"}}>three</b> response actions. Each one trades off
        differently between cost, inventory, profit, delivery speed, and customer satisfaction — there's
        no single "correct" combination, only different bets.
      </p>

      <WhyBox>
        Real crisis response is about trade-offs, not perfect answers. Speeding up delivery usually costs
        more; protecting cash usually slows you down. Watch how your three choices interact below.
      </WhyBox>

      <div className="choice-grid">
        {WAR_ROOM_ACTIONS.map(a => {
          const isSel = selected.includes(a.id);
          const disabled = !isSel && selected.length >= 3;
          return (
            <button
              key={a.id}
              className={"choice-card" + (isSel ? " selected" : "") + (disabled || locked ? " disabled" : "")}
              onClick={() => toggle(a.id)}
              disabled={locked}
            >
              <div className="choice-check">{isSel ? <Icon name="check" size={13} /> : ""}</div>
              <h3 className="choice-title">{a.title}</h3>
              <p className="choice-desc">{a.desc}</p>
              <div className="choice-tags">
                {a.tags.map(t => <span key={t} className="choice-pill">{t}</span>)}
              </div>
            </button>
          );
        })}
      </div>

      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", margin:"18px 0 6px", flexWrap:"wrap", gap:10}}>
        <span className="pill">{selected.length} / 3 actions selected</span>
        {!showResults && (
          <button className="btn btn-primary" disabled={selected.length !== 3} onClick={simulate}>
            <Icon name="spark" size={16} />
            Simulate Response
          </button>
        )}
      </div>

      {showResults && (
        <div className="metrics-panel">
          <div className="metrics-panel-title">Simulated business impact</div>
          <MetricBar name="Cost Control" value={metrics.cost} suffix="/100" />
          <MetricBar name="Inventory Health" value={metrics.inventory} suffix="/100" />
          <MetricBar name="Profit Margin" value={metrics.profit} suffix="/100" />
          <MetricBar name="Delivery Speed" value={metrics.delivery} suffix="/100" />
          <MetricBar name="Customer Satisfaction" value={metrics.satisfaction} suffix="/100" />
          <div className="why-box" style={{marginTop:4}}>
            <b>Reading these results:</b> nothing here is a fail state — a 35 on cost control simply
            means your three choices leaned toward speed and service over saving money. That's a valid
            strategy if customer trust matters most right now.
          </div>
          <div className="stage-footer" style={{marginTop:8}}>
            <span className="pill">Overall response index: {avgScore}/100</span>
            <button className="btn btn-primary" onClick={() => onComplete({ selected, metrics })}>
              Continue to Negotiation
              <Icon name="users" size={16} />
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* =========================================================================
   STAGE 4: NEGOTIATION
========================================================================= */
function Negotiation({ onComplete }){
  const [round, setRound] = useState(0);
  const [stats, setStats] = useState({ trust:50, price:50, leadTime:50 });
  const [history, setHistory] = useState([]);
  const [selectedIdx, setSelectedIdx] = useState(null);

  const current = NEGOTIATION_ROUNDS[round];
  const isLast = round === NEGOTIATION_ROUNDS.length - 1;

  const choose = (opt, idx) => {
    if (selectedIdx !== null) return;
    setSelectedIdx(idx);
    const next = {
      trust: clamp(stats.trust + opt.trust),
      price: clamp(stats.price + opt.price),
      leadTime: clamp(stats.leadTime + opt.leadTime),
    };
    setTimeout(() => {
      setStats(next);
      setHistory(h => [...h, { round: round+1, label: opt.label, note: opt.note }]);
    }, 50);
  };

  const advance = () => {
    if (isLast){
      const negotiationScore = Math.round((stats.trust + stats.price + stats.leadTime) / 3);
      onComplete({ stats, history, negotiationScore });
    } else {
      setRound(r => r + 1);
      setSelectedIdx(null);
    }
  };

  return (
    <div className="stage">
      <div className="eyebrow-label">Step 4 of 6 · Supplier Negotiation</div>
      <h1 className="stage-title">Negotiate with your backup supplier</h1>
      <p className="stage-sub">
        Four rounds, one relationship. Every choice shifts the supplier's trust in you, the price you'll
        pay, and how fast they'll prioritize your orders. Aggressive tactics can win on price but cost you
        trust — and trust is what gets you priority treatment the next time something goes wrong.
      </p>

      <div className="negotiation-stage">
        <div className="neg-round-label">Round {round+1} of {NEGOTIATION_ROUNDS.length}</div>
        <p className="neg-prompt">{current.prompt}</p>

        <div className="neg-stats">
          <div className="neg-stat">Trust<b style={{color:"var(--teal)"}}>{Math.round(stats.trust)}</b></div>
          <div className="neg-stat">Price Favorability<b style={{color:"var(--amber)"}}>{Math.round(stats.price)}</b></div>
          <div className="neg-stat">Lead Time Favorability<b style={{color:"var(--violet)"}}>{Math.round(stats.leadTime)}</b></div>
        </div>

        <div className="choice-grid">
          {current.options.map((opt, idx) => (
            <button
              key={idx}
              className={"choice-card" + (selectedIdx === idx ? " selected" : "") + (selectedIdx !== null && selectedIdx !== idx ? " disabled" : "")}
              onClick={() => choose(opt, idx)}
              disabled={selectedIdx !== null}
            >
              <div className="choice-check">{selectedIdx === idx ? <Icon name="check" size={13} /> : ""}</div>
              <h3 className="choice-title">{opt.label}</h3>
              {selectedIdx === idx && <p className="choice-desc">{opt.note}</p>}
            </button>
          ))}
        </div>

        {selectedIdx !== null && (
          <div className="stage-footer" style={{marginTop:6}}>
            <span></span>
            <button className="btn btn-primary" onClick={advance}>
              {isLast ? "See Negotiation Outcome" : "Next Round"}
              <Icon name="alert" size={16} />
            </button>
          </div>
        )}
      </div>

      <WhyBox>
        Real supplier negotiations are repeated games, not one-off transactions. Burning trust for a
        short-term discount can come back to bite you the next time you need flexibility.
      </WhyBox>
    </div>
  );
}

/* =========================================================================
   STAGE 5: CEO BOARDROOM
========================================================================= */
function Boardroom({ onComplete }){
  const [qIndex, setQIndex] = useState(0);
  const [score, setScore] = useState(0);
  const [selectedIdx, setSelectedIdx] = useState(null);
  const [answers, setAnswers] = useState([]);

  const current = BOARDROOM_QUESTIONS[qIndex];
  const isLast = qIndex === BOARDROOM_QUESTIONS.length - 1;

  const choose = (opt, idx) => {
    if (selectedIdx !== null) return;
    setSelectedIdx(idx);
  };

  const advance = () => {
    const opt = current.options[selectedIdx];
    const newScore = score + opt.score;
    const newAnswers = [...answers, { q: current.q, label: opt.label, tone: opt.tone, score: opt.score }];
    if (isLast){
      onComplete({ leadershipScore: Math.round((newScore / (20 * BOARDROOM_QUESTIONS.length)) * 100), answers: newAnswers });
    } else {
      setScore(newScore);
      setAnswers(newAnswers);
      setQIndex(q => q + 1);
      setSelectedIdx(null);
    }
  };

  return (
    <div className="stage">
      <div className="eyebrow-label">Step 5 of 6 · CEO Boardroom</div>
      <h1 className="stage-title">Lead from the top</h1>
      <p className="stage-sub">
        As CEO, your job shifts from operational fixes to judgment calls — what to say, what to fund, and
        what example to set. Five questions, each testing a different facet of executive decision-making.
      </p>

      <div className="negotiation-stage">
        <div className="question-counter">Question {qIndex+1} of {BOARDROOM_QUESTIONS.length}</div>
        <p className="neg-prompt">{current.q}</p>

        <div className="choice-grid">
          {current.options.map((opt, idx) => (
            <button
              key={idx}
              className={"choice-card" + (selectedIdx === idx ? " selected" : "") + (selectedIdx !== null && selectedIdx !== idx ? " disabled" : "")}
              onClick={() => choose(opt, idx)}
              disabled={selectedIdx !== null}
            >
              <div className="choice-check">{selectedIdx === idx ? <Icon name="check" size={13} /> : ""}</div>
              <h3 className="choice-title">{opt.label}</h3>
              {selectedIdx === idx && <p className="choice-desc">{opt.tone}</p>}
            </button>
          ))}
        </div>

        {selectedIdx !== null && (
          <div className="stage-footer" style={{marginTop:6}}>
            <span></span>
            <button className="btn btn-primary" onClick={advance}>
              {isLast ? "See Leadership Score" : "Next Question"}
              <Icon name="alert" size={16} />
            </button>
          </div>
        )}
      </div>

      <WhyBox>
        There's rarely one "right" leadership answer — but some choices consistently build long-term
        trust with employees, customers, and the board, while others trade that trust for short-term
        comfort.
      </WhyBox>
    </div>
  );
}

/* =========================================================================
   STAGE 6: AI STRATEGY
========================================================================= */
function AIStrategy({ onComplete }){
  const [selected, setSelected] = useState([]);

  const toggle = (id) => {
    setSelected(prev => {
      if (prev.includes(id)) return prev.filter(x => x !== id);
      if (prev.length >= 2) return prev;
      return [...prev, id];
    });
  };

  const submit = () => {
    const chosen = AI_INVESTMENTS.filter(a => selected.includes(a.id));
    const totals = chosen.reduce((acc, a) => {
      acc.cost += a.boosts.cost || 0;
      acc.resilience += a.boosts.resilience || 0;
      acc.satisfaction += a.boosts.satisfaction || 0;
      return acc;
    }, { cost:0, resilience:0, satisfaction:0 });
    onComplete({ selected: chosen, totals });
  };

  return (
    <div className="stage">
      <div className="eyebrow-label">Step 6 of 6 · AI Strategy</div>
      <h1 className="stage-title">Invest in future resilience</h1>
      <p className="stage-sub">
        The crisis is under control. Now look ahead: choose <b style={{color:"var(--text-0)"}}>two</b> AI
        investments to strengthen the supply chain against the next disruption. Each one targets a
        different weak point.
      </p>

      <WhyBox>
        AI investments aren't magic fixes — they're targeted tools. Forecasting helps you see disruptions
        coming; risk monitoring helps you see supplier weakness before it breaks; copilots speed up the
        humans already doing the work.
      </WhyBox>

      <div className="choice-grid">
        {AI_INVESTMENTS.map(a => {
          const isSel = selected.includes(a.id);
          const disabled = !isSel && selected.length >= 2;
          return (
            <button
              key={a.id}
              className={"choice-card" + (isSel ? " selected" : "") + (disabled ? " disabled" : "")}
              onClick={() => toggle(a.id)}
            >
              <div className="choice-check">{isSel ? <Icon name="check" size={13} /> : ""}</div>
              <div style={{marginBottom:10}}><Icon name={a.icon} size={20} color="var(--amber)" /></div>
              <h3 className="choice-title">{a.title}</h3>
              <p className="choice-desc">{a.desc}</p>
              <p className="choice-desc" style={{color:"var(--teal)", fontWeight:600}}>{a.impact}</p>
            </button>
          );
        })}
      </div>

      <div className="stage-footer">
        <span className="pill">{selected.length} / 2 investments selected</span>
        <button className="btn btn-primary" disabled={selected.length !== 2} onClick={submit}>
          Generate Final Report
          <Icon name="target" size={16} />
        </button>
      </div>
    </div>
  );
}

/* =========================================================================
   STAGE 7: FINAL DASHBOARD
========================================================================= */
function FinalDashboard({ allData, onReplay }){
  const { company, crisis, warRoom, negotiation, boardroom, aiStrategy } = allData;
  const [animScore, setAnimScore] = useState(0);

  // ---- compute sub-scores (0-100) ----
  const resilience = clamp(Math.round(
    (warRoom.metrics.inventory + warRoom.metrics.delivery + aiStrategy.totals.resilience * 1.6) / 2
  ));
  const costControl = clamp(Math.round(
    (warRoom.metrics.cost + warRoom.metrics.profit) / 2 - (aiStrategy.totals.cost * 0.3)
  ));
  const negotiationScore = clamp(negotiation.negotiationScore);
  const leadershipScore = clamp(boardroom.leadershipScore);
  const customerSatisfaction = clamp(Math.round(
    (warRoom.metrics.satisfaction + aiStrategy.totals.satisfaction * 1.8) / 2
  ));
  const riskManagement = clamp(Math.round(
    (negotiation.stats.trust + aiStrategy.totals.resilience * 1.5 + (100 - crisis.financialImpact * 4)) / 3
  ));

  const overall = clamp(Math.round(
    (resilience + costControl + negotiationScore + leadershipScore + customerSatisfaction + riskManagement) / 6
  ));

  useEffect(() => {
    const t = setTimeout(() => setAnimScore(overall), 150);
    return () => clearTimeout(t);
  }, [overall]);

  const grade =
    overall >= 85 ? "Exceptional Crisis Leadership" :
    overall >= 70 ? "Strong Operator" :
    overall >= 55 ? "Steady Hand, Room to Grow" :
    overall >= 40 ? "Survived, Lessons Ahead" :
    "Trial by Fire";

  const ringColor = overall >= 70 ? "var(--teal)" : overall >= 45 ? "var(--amber)" : "var(--red)";
  const circumference = 2 * Math.PI * 70;
  const offset = circumference - (animScore / 100) * circumference;

  // ---- biggest mistake / best decision logic ----
  const subScores = [
    { name: "Resilience", value: resilience },
    { name: "Cost Control", value: costControl },
    { name: "Negotiation", value: negotiationScore },
    { name: "Leadership", value: leadershipScore },
    { name: "Customer Satisfaction", value: customerSatisfaction },
    { name: "Risk Management", value: riskManagement },
  ];
  const weakest = subScores.reduce((a,b) => a.value < b.value ? a : b);
  const strongest = subScores.reduce((a,b) => a.value > b.value ? a : b);

  const mistakeText = {
    "Resilience": "Your response leaned too heavily on short-term fixes rather than rebuilding buffer capacity — the next disruption will hit just as hard.",
    "Cost Control": "Spending moved faster than discipline during the response, eroding margin more than the crisis itself required.",
    "Negotiation": "One or two hardline moments in the supplier negotiation cost more trust than the price savings were worth.",
    "Leadership": "A few boardroom calls prioritized short-term comfort over the kind of transparency that builds lasting credibility.",
    "Customer Satisfaction": "Operational fixes outpaced communication — customers likely felt the disruption before they heard from you.",
    "Risk Management": "Underlying exposure (supplier concentration, weak monitoring) wasn't addressed enough to prevent a repeat crisis.",
  }[weakest.name];

  const bestText = {
    "Resilience": "Your choices meaningfully rebuilt the company's ability to absorb future shocks, not just survive this one.",
    "Cost Control": "You protected margin without sacrificing the response — a genuinely hard balance to strike under pressure.",
    "Negotiation": "You built real trust with your supplier while still protecting favorable terms — that pays off long after this crisis ends.",
    "Leadership": "Your boardroom decisions consistently chose transparency and long-term credibility over short-term comfort.",
    "Customer Satisfaction": "Customers were kept informed and prioritized throughout, which is often what determines loyalty after a crisis.",
    "Risk Management": "You meaningfully reduced the company's exposure to the next disruption, not just this one.",
  }[strongest.name];

  const expertRec =
    weakest.name === "Cost Control" ? "Build a pre-approved 'crisis budget' tier so cost discipline doesn't depend on in-the-moment judgment calls." :
    weakest.name === "Negotiation" ? "Invest in supplier relationship management year-round, not just during negotiations — trust compounds." :
    weakest.name === "Leadership" ? "Run quarterly crisis-communication tabletop exercises so transparent instincts become second nature under pressure." :
    weakest.name === "Customer Satisfaction" ? "Pair every operational response with a parallel customer-communication plan from day one." :
    weakest.name === "Risk Management" ? "Expand supplier risk monitoring coverage now, while the lesson from this crisis is still fresh." :
    "Maintain a standing safety-stock policy sized to your slowest lead-time category, not your average.";

  const lessons = [
    `${company.name} ran on ${company.inventoryDays} days of inventory against a ${company.leadTime}-day lead time — that gap is exactly where crises do the most damage.`,
    `The ${crisis.type.toLowerCase()} put ${crisis.financialImpact}% of revenue at risk — a reminder that ${crisis.impactArea.toLowerCase()} is a single point of failure worth investing around.`,
    `Negotiation trust ended at ${Math.round(negotiation.stats.trust)}/100 — trust built under pressure tends to outlast any single discount.`,
    `Your strongest dimension was ${strongest.name} (${strongest.value}/100) — that's the muscle this organization should keep training.`,
    `Your weakest dimension was ${weakest.name} (${weakest.value}/100) — that's the clearest opportunity for the next planning cycle.`,
  ];

  return (
    <div className="stage">
      <div className="eyebrow-label">Final Report</div>
      <h1 className="stage-title">Crisis Debrief: {company.name}</h1>
      <p className="stage-sub">
        Here's how your decisions across the War Room, negotiation, boardroom, and AI strategy combined
        into a single resilience profile for {company.name}.
      </p>

      <div className="score-hero">
        <div className="score-ring-wrap">
          <svg width="160" height="160" viewBox="0 0 160 160">
            <circle className="score-ring-bg" cx="80" cy="80" r="70" />
            <circle
              className="score-ring-fg"
              cx="80" cy="80" r="70"
              stroke={ringColor}
              strokeDasharray={circumference}
              strokeDashoffset={offset}
            />
          </svg>
          <div className="score-ring-text">
            <div className="num">{animScore}</div>
            <div className="lbl">Crisis Score</div>
          </div>
        </div>
        <div className="score-hero-text">
          <h2 className="score-grade">{grade}</h2>
          <p className="score-blurb">
            Across six decision points, {company.name} navigated a {crisis.urgency.toLowerCase()}-urgency
            {" "}{crisis.type.toLowerCase()} with an overall crisis score of <b style={{color:"var(--text-0)"}}>{overall}/100</b>.
            The breakdown below shows exactly where your strategy paid off and where it left value on the table.
          </p>
        </div>
      </div>

      <div className="metrics-panel">
        <div className="metrics-panel-title">Performance breakdown</div>
        <MetricBar name="Leadership" value={leadershipScore} suffix="/100" />
        <MetricBar name="Negotiation" value={negotiationScore} suffix="/100" />
        <MetricBar name="Resilience" value={resilience} suffix="/100" />
        <MetricBar name="Cost Control" value={costControl} suffix="/100" />
        <MetricBar name="Risk Management" value={riskManagement} suffix="/100" />
        <MetricBar name="Customer Satisfaction" value={customerSatisfaction} suffix="/100" />
      </div>

      <div className="feedback-grid">
        <div className="feedback-card mistake">
          <div className="fc-label">Biggest mistake</div>
          <div className="fc-body">{mistakeText}</div>
        </div>
        <div className="feedback-card best">
          <div className="fc-label">Best decision</div>
          <div className="fc-body">{bestText}</div>
        </div>
        <div className="feedback-card expert">
          <div className="fc-label">Expert recommendation</div>
          <div className="fc-body">{expertRec}</div>
        </div>
      </div>

      <div className="lessons-panel">
        <div className="metrics-panel-title" style={{marginBottom:14}}>Lessons learned</div>
        <ul>
          {lessons.map((l,i) => <li key={i}>{l}</li>)}
        </ul>
      </div>

      <div className="stage-footer" style={{justifyContent:"center"}}>
        <button className="btn btn-primary" onClick={onReplay}>
          <Icon name="compass" size={17} />
          Run a New Simulation
        </button>
      </div>
    </div>
  );
}

const STAGE_LABELS = ["Welcome","Company","Crisis","War Room","Negotiation","Boardroom","AI Strategy","Report"];

function App(){
  const [stage, setStage] = useState(0); // 0=welcome,1=company,2=crisis,3=warroom,4=negotiation,5=boardroom,6=ai,7=final
  const [company, setCompany] = useState(null);
  const [crisis, setCrisis] = useState(null);

  const [boardroomData, setBoardroomData] = useState(null);

  const startSimulation = () => {
    const c = generateCompany();
    const cr = generateCrisis(c);
    setCompany(c);
    setCrisis(cr);
    setStage(1);

    setWarRoomData(null);
    setNegotiationData(null);

  else if (stage === 3) content = <WarRoom onComplete={(d) => { setWarRoomData(d); setStage(4); }} />;
  else if (stage === 4) content = <Negotiation onComplete={(d) => { setNegotiationData(d); setStage(5); }} />;
  else if (stage === 5) content = <Boardroom onComplete={(d) => { setBoardroomData(d); setStage(6); }} />;
  else if (stage === 6) content = <AIStrategy onComplete={(d) => { setAiData(d); setStage(7); }} />;
  else if (stage === 7) content = (
    <FinalDashboard
      allData={{
        company, crisis,
        warRoom: warRoomData,
        negotiation: negotiationData,
        boardroom: boardroomData,
        aiStrategy: aiData,
      }}

  return (
    <div className="scaffold">
      <TopBar stageIndex={Math.min(stage, 7)} totalStages={7} crisisActive={crisisActive} />
      {stage > 0 && stage < 7 && <Stepper stageIndex={stage - 1} labels={STAGE_LABELS.slice(1,7)} />}
      {content}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
